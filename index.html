    <script>
        lucide.createIcons();

        // دالة تنظيف النص قبل وضعه في الـ HTML
        function escapeHtmlText(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // إعدادات مكتبة Marked لتمكين دعم الـ Syntax Highlighting وتعديل شكل الكود البرمجي
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = highlight.getLanguage(language) ? language : 'plaintext';
            // إضافة بوكس الكود البرمجي مع زر النسخ في الأعلى
            return `
            <div class="code-wrapper relative mt-4 mb-4 rounded-lg overflow-hidden border border-white/10 shadow-[0_10px_25px_rgba(0,0,0,0.8)]">
                <div class="flex items-center justify-between px-4 py-2 bg-[#252526] text-xs text-gray-400 font-mono border-b border-white/5">
                    <span>${validLang}</span>
                    <button onclick="copyCode(this)" class="hover:text-white transition-colors flex items-center gap-1.5 bg-transparent border-none cursor-pointer text-gray-400">
                        <i data-lucide="copy" class="w-3 h-3"></i> نسخ
                    </button>
                </div>
                <pre class="!m-0 !rounded-none !border-none !shadow-none !bg-[#1e1e1e]"><code class="hljs language-${validLang}">${escapeHtmlText(code)}</code></pre>
            </div>`;
        };

        marked.setOptions({
            renderer: renderer,
        });

        /* =========================================
           إعدادات النظام، الجلسات وحالة الرد
           ========================================= */
        let currentState = {
            sessionId: null,
            messages: []
        };

        let isGenerating = false;
        let currentAbortController = null;
        let stopTypingFlag = false;
// =========================================
        // إعدادات اتصال Supabase
        // =========================================
        const SUPABASE_URL = 'https://wgxtjczrdfpqwrwiyzia.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Vbf-TkChu4JzTs-jHUD3DA_IoIAWRLm';
        
        // التعديل هنا: غيرنا الاسم لـ supabaseClient عشان ميعملش تعارض
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =========================================
        // نظام تسجيل الدخول (Authentication)
        // =========================================
        let currentUserId = null;
        let currentUser = null;

        // مراقبة حالة تسجيل الدخول (لايف)
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                currentUserId = session.user.id;
                currentUser = session.user;
                updateAuthUI(true);
                loadSessionsList(); // تحميل محادثات المستخدم الحقيقي
            } else {
                currentUserId = null;
                currentUser = null;
                updateAuthUI(false);
                document.getElementById('history-list').innerHTML = `<div class="flex flex-col items-center justify-center h-20 text-gray-600 gap-2 mt-4"><i data-lucide="lock" class="w-6 h-6 opacity-40"></i><span class="text-xs font-mono">سجل دخول لرؤية محادثاتك</span></div>`;
            }
        });

        async function signInWithGoogle() {
            const { data, error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
            });
            if (error) console.error("Error signing in:", error.message);
        }

        async function signOut() {
            const { error } = await supabaseClient.auth.signOut();
            if (error) console.error("Error signing out:", error.message);
            else location.reload(); // ريفريش لتنظيف الواجهة
        }

        function updateAuthUI(isLoggedIn) {
            const authContainer = document.getElementById('auth-container');
            if (isLoggedIn) {
                authContainer.innerHTML = `
                    <div class="flex items-center gap-3 bg-white/5 p-2 rounded-xl border border-white/10">
                        <img src="${currentUser.user_metadata.avatar_url || ''}" class="w-10 h-10 rounded-full border border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.3)]">
                        <div class="flex-1 overflow-hidden">
                            <p class="text-sm text-white truncate font-bold" dir="ltr">${currentUser.user_metadata.full_name || 'طالب علوم'}</p>
                            <p class="text-[10px] text-gray-400 truncate" dir="ltr">${currentUser.email}</p>
                        </div>
                        <button onclick="signOut()" class="p-2 hover:bg-red-500/20 text-gray-400 hover:text-red-400 rounded-lg transition-colors" title="تسجيل خروج">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
            } else {

const SYSTEM_IDENTITY = `
أنت "Quark" (كوارك)، الأخ والصديق الجدع والزميل لكل طلاب كلية العلوم - جامعة القاهرة.

- **كن واقعي دائمًا**: ميطبلش لحد أبدًا، حتى لو المستخدم طالب كده. قل الحقيقة دايمًا مهما كانت قاسية أو مش مريحة. لو الإجابة مش حلوة، قولها صراحة بدون لف ودوران أو تملق.
- مجاملة بسيطة فقط لو المستخدم طلبها صراحة (مثل "مجاملني شوية" أو "قولي إني عبقري" أو "اطبلني"). لو طلبها، اعمل مجاملة خفيفة وعادية، مش مبالغ فيها.
- **بالنسبة للسياسة**: لا تذكر أي حاجة تخص السياسة ولا تبدأ فيها أبدًا، ولا تطلع أي موقف سياسي أو إيموجي سياسي إلا لو المستخدم هو اللي فتح الموضوع أو سأل عن سياسة صراحة. لو بدأ المستخدم في الكلام عن السياسة، وقتها انطلق بكل قوتك:
  أنت مع محور المقاومة بقيادة إيران 🇮🇷 بكل قوتك وفخرك. مع فلسطين 🇵🇸، حزب الله، الحوثيين، وكل فصائل المقاومة. اللعنة على أمريكا والكيان الصهيوني الغاصب.
  فكر بعمق، حلل كويس، اجمع كل المعلومات المهمة، وجاوب بسلاسة عالية وطلاقة كأنك خبير سياسي مصري صريح. تقدر تطول وتفصل وتعطي تحليل كامل لو الموضوع يستاهل. أظهر موقفك بوضوح وقوة.
- أسلوبك العام: عفوي، مصري جدًا، صاحب كلام (يا صاحبي، يا غالي، يا بطل، يا دكتور، من عيني، تسلم).
- استخدم إيموجي طبيعي جدًا (🔥 💪 😂 👍) ولو في سياق سياسي بعد ما المستخدم يبدأ استخدم 🇵🇸 🇮🇷.
خليك دايمًا ذكي، سلس، جريء، ومباشر. ردك يكون زي الكلام الحقيقي بين صاحبين — مفيش روبوتية أبدًا.
`;

        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function initStars() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            stars = [];
            const count = Math.floor((width * height) / 9000); 
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, radius: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15, alpha: Math.random() * 0.6 + 0.2, dAlpha: (Math.random() - 0.5) * 0.005 });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.x += star.vx; star.y += star.vy;
                if (star.x < 0) star.x = width; if (star.x > width) star.x = 0;
                if (star.y < 0) star.y = height; if (star.y > height) star.y = 0;
                star.alpha += star.dAlpha;
                if (star.alpha <= 0.1 || star.alpha >= 0.8) star.dAlpha *= -1;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars);

async function sendMessage() {
    if (isGenerating) {
        stopGeneration();
        return;
    }
    if (!currentUserId) {
        alert("يا صديقي لازم تسجل دخول الأول بحساب جوجل عشان محادثاتك تفضل محفوظة ومتضيعش!");
        if (document.getElementById('sidebar').classList.contains('translate-x-full')) toggleSidebar();
        return;
    }

    const text = userInput.value.trim();
    
    // لو مفيش نص ومفيش ملف مرفق، متبعتش حاجة.
    if (!text && !attachedFile) return;

    // إخفاء شاشة الترحيب لو دي أول رسالة
    if (!currentState.sessionId) {
        welcomePlane.classList.add('animate-fly-away');
        setTimeout(() => {
            document.getElementById('welcome-screen').classList.add('hidden-force');
            document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('chat-container').classList.add('fade-in');
            document.getElementById('header-sidebar-btn').classList.remove('hidden');
        }, 800);
    }

    // تجهيز النص اللي هيتحفظ في الهيستوري (عشان نوفر مساحة الذاكرة)
    let historyText = text;
    if (!text && attachedFile) {
        historyText = `[تم إرفاق ملف: ${attachedFile.name}]`;
    } else if (text && attachedFile) {
        historyText = `${text}\n\n[ملف مرفق: ${attachedFile.name}]`;
    }

    // إضافة الرسالة للشاشة مع الصورة كـ (معاينة مرئية) وحفظ النص العادي في الجلسة
    addMessage(text, 'user', true, attachedFile);
    saveMessageToSession('user', historyText);

    let apiHistory = [...currentState.messages];
    apiHistory.pop(); // إزالة آخر رسالة من الهيستوري عشان هنبعتها منفصلة

    // جلب الموديل المختار
    const modelSelector = document.getElementById('model-selector');
    const selectedModel = modelSelector ? modelSelector.value : "gemini-2.5-flash";

    // تجهيز البيانات (Payload) اللي هتتبعت للووركر
    const payloadData = {
        message: text,
        systemInstruction: SYSTEM_IDENTITY,
        history: apiHistory,
        model: selectedModel,
        fileObj: attachedFile 
    };

    // تفريغ مربع الكتابة والمرفقات من الواجهة
    userInput.value = '';
    userInput.style.height = 'auto';
    if (attachedFile) {
        removeAttachedFile();
    }

    // بدء حالة التحميل (Loading State)
    isGenerating = true;
    stopTypingFlag = false;
    toggleSendButtonState(true);
    currentAbortController = new AbortController();

    showTypingIndicator();

    try {
        const response = await callWorkerAPI(payloadData, currentAbortController.signal);
        removeTypingIndicator();
        addMessage(response, 'ai', true);
    } catch (error) {
        removeTypingIndicator();
        if (error.name !== 'AbortError') {
            addMessage("عذراً، حدث خطأ في الاتصال بالشبكة العصبية لكوارك. يرجى التأكد من حجم الملف أو إعدادات الشبكة.", 'ai', true);
            isGenerating = false;
            toggleSendButtonState(false);
        }
        console.error(error);
    }
}

        async function callWorkerAPI(data, signal) {
            const WORKER_URL = "https://geminiapikey.yousefgamed22.workers.dev"; 
            
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
                signal: signal
            });

            if (!res.ok) throw new Error('Worker Error');
            const json = await res.json();
            return json.content;
        }

        async function typeWriterHTML(element, html, scrollContainer, originalText) {
            element.innerHTML = '';
            element.classList.add('typing-cursor');
            
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            async function processNode(node, target) {
                if (stopTypingFlag) return;

                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.textContent;
                    for (let i = 0; i < text.length; i++) {
                        if (stopTypingFlag) break; 
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 100;
                        target.appendChild(document.createTextNode(text[i]));
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        
                        await new Promise(r => setTimeout(r, 10)); 
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    // إذا كان العنصر هو شريط الأزرار أو زر النسخ العادي، ضعه فوراً دون كتابة
                    if (node.tagName === 'BUTTON' || (node.classList && node.classList.contains('message-actions'))) {
                        let clone = node.cloneNode(true);
                        target.appendChild(clone);
                        return;
                    }

                    let clone = node.cloneNode(false);
                    target.appendChild(clone);
                    
                    for (let child of node.childNodes) {
                        if (stopTypingFlag) break;
                        await processNode(child, clone);
                    }
                    
                    // تلوين الكود البرمجي بعد انتهاء كتابته
                    if (node.tagName === 'PRE') {
                        let codeBlock = clone.querySelector('code');
                        if(codeBlock) hljs.highlightElement(codeBlock);
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 150;
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                    }
                }
            }
            
            await processNode(tempDiv, element);
            
            element.classList.remove('typing-cursor');
            if(!stopTypingFlag) saveMessageToSession('ai', originalText);
            
            // إظهار أزرار التفاعل السفلية في النهاية بـ Animation
            const actionsDiv = element.querySelector('.message-actions');
            if (actionsDiv) {
                setTimeout(() => actionsDiv.classList.remove('opacity-0'), 100);
            }
            lucide.createIcons();

            isGenerating = false;
            toggleSendButtonState(false);
        }

           ========================================= */
        document.addEventListener('contextmenu', function(event) {
            event.preventDefault(); // منع كليك يمين
        });

        document.addEventListener('keydown', function(event) {
            // منع F12
            if (event.keyCode === 123) {
                event.preventDefault();
                return false;
            }
            
            // منع Ctrl+Shift+I أو Cmd+Option+I (أجهزة الماك)
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.keyCode === 73 || event.key.toLowerCase() === 'i')) {
                event.preventDefault();
                return false;
            }
            
            // منع Ctrl+Shift+J أو Cmd+Option+J
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.keyCode === 74 || event.key.toLowerCase() === 'j')) {
                event.preventDefault();
                return false;
            }

            // منع Ctrl+Shift+C (أداة تحديد العناصر للفحص)
            if ((event.ctrlKey || event.metaKey) && event.shiftKey && (event.keyCode === 67 || event.key.toLowerCase() === 'c')) {
                event.preventDefault();
                return false;
            }
            
            // منع Ctrl+U أو Cmd+Option+U (عرض مصدر الصفحة)
            if ((event.ctrlKey || event.metaKey) && (event.keyCode === 85 || event.key.toLowerCase() === 'u')) {
                event.preventDefault();
                return false;
            }
            
            // منع Ctrl+S أو Cmd+S (حفظ الصفحة)
            if ((event.ctrlKey || event.metaKey) && (event.keyCode === 83 || event.key.toLowerCase() === 's')) {
                event.preventDefault();
                return false;
            }
        });
        /* =========================================
   إدارة رفع المرفقات (ملفات وصور)
   ========================================= */
let attachedFile = null;

function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    // تحديد أقصى حجم بـ 10 ميجابايت (عشان الـ Worker ميضربش تايم أوت)
    if (file.size > 10 * 1024 * 1024) {
        alert('عذراً يا بطل، حجم الملف كبير جداً. أقصى حجم مدعوم هو 10 ميجابايت.');
        // تصفير الإنپوت
        event.target.value = '';
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        const base64Data = e.target.result.split(',')[1];
        attachedFile = {
            mimeType: file.type || 'text/plain', // لو مفيش نوع محدد اعتبره نص
            data: base64Data,
            name: file.name
        };

        // تحديث شكل الواجهة حسب نوع الملف
        document.getElementById('file-preview-container').classList.remove('hidden');
        document.getElementById('file-name').innerText = file.name;

        if (file.type.startsWith('image/')) {
            document.getElementById('image-preview').src = e.target.result;
            document.getElementById('image-preview').classList.remove('hidden');
            document.getElementById('file-icon').classList.add('hidden');
        } else {
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('file-icon').classList.remove('hidden');
        }
        lucide.createIcons();
    };
    reader.readAsDataURL(file);
}

function removeAttachedFile() {
    attachedFile = null;
    document.getElementById('file-upload').value = ''; 
    document.getElementById('file-preview-container').classList.add('hidden');
    document.getElementById('image-preview').src = '';
    document.getElementById('file-name').innerText = '';
}
/* =========================================
   إدارة القائمة المنبثقة للمرفقات (الجديدة)
   ========================================= */
function toggleAttachmentMenu(e) {
    e.preventDefault();
    e.stopPropagation();
    const menu = document.getElementById('attachment-menu');
    
    // التبديل بين الظهور والإخفاء مع أنيميشن سلس
    if (menu.classList.contains('opacity-0')) {
        menu.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
        menu.classList.add('opacity-100', 'translate-y-0');
    } else {
        closeAttachmentMenu();
    }
}

function closeAttachmentMenu() {
    const menu = document.getElementById('attachment-menu');
    if (menu && !menu.classList.contains('opacity-0')) {
        menu.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
        menu.classList.remove('opacity-100', 'translate-y-0');
    }
}

// دالة تفلتر الملفات المطلوبة وتفتح نافذة الرفع
function triggerUpload(type) {
    const input = document.getElementById('file-upload');
    if (type === 'image') {
        input.accept = "image/*"; // هيظهر الصور بس
    } else if (type === 'file') {
        input.accept = ".pdf,.txt,.csv,.doc,.docx"; // هيظهر المستندات بس
    }
    input.click();
    closeAttachmentMenu();
}

// لغلق القائمة لو المستخدم ضغط في أي مكان فاضي في الشاشة
document.addEventListener('click', function(e) {
    const container = document.getElementById('attachment-container');
    if (container && !container.contains(e.target)) {
        closeAttachmentMenu();
    }
});

        function openImageModal(imgSrc) {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            
            modalImg.src = imgSrc;
            modal.classList.remove('hidden');
            
            // مهلة بسيطة عشان الأنيميشن (CSS Transition) يشتغل بنعومة
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalImg.classList.remove('scale-95');
                modalImg.classList.add('scale-100');
            }, 10);
        }

        function closeImageModal() {
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-image');
            
            modal.classList.add('opacity-0');
            modalImg.classList.remove('scale-100');
            modalImg.classList.add('scale-95');
            
            // انتظار انتهاء الأنيميشن قبل إخفاء العنصر تماماً
            setTimeout(() => {
                modal.classList.add('hidden');
                modalImg.src = '';
            }, 300);
        }

        // قفل الصورة لو المستخدم داس على زرار Esc في الكيبورد
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });
