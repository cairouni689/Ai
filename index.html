async function signInWithGoogle() {
            // حفظ المحادثة المؤقتة في المتصفح قبل الانتقال لجوجل
            if (!currentUserId && currentState.messages.length > 0) {
                localStorage.setItem('pendingGuestSession', JSON.stringify({
                    messages: currentState.messages
                }));
            }
            
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://quark-4hz.pages.dev/' 
                }
            });
            if (error) console.error("Error signing in:", error.message);
        }

        // دالة لترحيل المحادثة المؤقتة بعد تسجيل الدخول بنجاح
        async function migrateGuestSession() {
            const pendingSessionStr = localStorage.getItem('pendingGuestSession');
            if (pendingSessionStr) {
                // نحذفها من الذاكرة فوراً عشان متتكررش مرتين
                localStorage.removeItem('pendingGuestSession'); 
                try {
                    const pendingData = JSON.parse(pendingSessionStr);
                    const messages = pendingData.messages;
                    
                    if (messages && messages.length > 0) {
                        const newSessionId = crypto.randomUUID();
                        const firstUserMsg = messages.find(m => m.role === 'user')?.content || 'محادثة جديدة';
                        const title = firstUserMsg.substring(0, 30) + (firstUserMsg.length > 30 ? '...' : '');

                        // حفظ الجلسة والرسايل للـ User الجديد في قاعدة البيانات
                        await supabaseClient.from('sessions').insert([
                            { id: newSessionId, user_id: currentUserId, title: title }
                        ]);

                        const messagesToInsert = messages.map(msg => ({
                            session_id: newSessionId,
                            role: msg.role,
                            content: msg.content
                        }));

                        await supabaseClient.from('messages').insert(messagesToInsert);

                        // تعيين الجلسة الحالية
                        currentState.sessionId = newSessionId;
                        currentState.messages = messages;
                        
                        // عرض المحادثة مباشرة وإخفاء شاشة الترحيب
                        document.getElementById('welcome-screen').classList.add('hidden-force');
                        document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
                        document.getElementById('chat-container').classList.remove('hidden');
                        document.getElementById('header-sidebar-btn').classList.remove('hidden');
                        document.getElementById('chat-container').innerHTML = '';
                        
                        // رسم الرسايل القديمة على الشاشة
                        currentState.messages.forEach(msg => {
                            addMessage(msg.content, msg.role, false);
                        });
                        
                        return true; 
                    }
                } catch (e) {
                    console.error("Error migrating guest session:", e);
                }
            }
            return false; 
        }

        async function saveMessageToSession(role, content) {
            if (!currentState.sessionId) {
                currentState.sessionId = crypto.randomUUID();
                let title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                
                // يحفظ الجلسة في الداتابيز فقط لو مسجل دخول
                if (currentUserId) {
                    await supabaseClient.from('sessions').insert([
                        { id: currentState.sessionId, user_id: currentUserId, title: title }
                    ]);
                }
            }

            // بيحفظ الرسالة في الذاكرة المؤقتة للشاشة عشان تفضل ظاهرة
            currentState.messages.push({ role, content, timestamp: Date.now() });

            // يحفظ الرسالة في الداتابيز ويحدث القائمة فقط لو مسجل دخول
            if (currentUserId) {
                await supabaseClient.from('messages').insert([
                    { session_id: currentState.sessionId, role: role, content: content }
                ]);
                loadSessionsList();
            }
        }

        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function initStars() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            stars = [];
            const count = Math.floor((width * height) / 9000); 
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, radius: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15, alpha: Math.random() * 0.6 + 0.2, dAlpha: (Math.random() - 0.5) * 0.005 });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.x += star.vx; star.y += star.vy;
                if (star.x < 0) star.x = width; if (star.x > width) star.x = 0;
                if (star.y < 0) star.y = height; if (star.y > height) star.y = 0;
                star.alpha += star.dAlpha;
                if (star.alpha <= 0.1 || star.alpha >= 0.8) star.dAlpha *= -1;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars);

        async function callWorkerAPI(data, signal) {
            const WORKER_URL = "https://geminiapikey.yousefgamed22.workers.dev"; 
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    signal: signal
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Worker Error (${res.status}): ${errText}`);
                }
                
                const json = await res.json();
                return json; 
            } catch (e) {
                throw new Error(`فشل الاتصال: ${e.message}`);
            }
        }

        async function sendMessage() {
            if (isGenerating) {
                stopGeneration();
                return;
            }
            if (!currentUserId) {
                // بنحسب المستخدم بعت كام رسالة في الشات الحالي
                let userMsgCount = currentState.messages.filter(m => m.role === 'user').length;
                
                if (userMsgCount >= 4) {
                    alert("يا بطل إنت استهلكت الـ 4 رسائل التجريبية في الشات ده! 🚀\nعشان تكمل المحادثة وتحفظها، سجل دخول بحساب جوجل من القائمة الجانبية.");
                    if (document.getElementById('sidebar').classList.contains('translate-x-full')) toggleSidebar();
                    return;
                }
            }

            const text = userInput.value.trim();
            
            if (!text && !attachedFile) return;

            if (!currentState.sessionId) {
                welcomePlane.classList.add('animate-fly-away');
                setTimeout(() => {
                    document.getElementById('welcome-screen').classList.add('hidden-force');
                    document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
                    document.getElementById('chat-container').classList.remove('hidden');
                    document.getElementById('chat-container').classList.add('fade-in');
                    document.getElementById('header-sidebar-btn').classList.remove('hidden');
                }, 800);
            }

            let historyText = text;
            if (!text && attachedFile) {
                historyText = `[تم إرفاق ملف: ${attachedFile.name}]`;
            } else if (text && attachedFile) {
                historyText = `${text}\n\n[ملف مرفق: ${attachedFile.name}]`;
            }

            addMessage(text, 'user', true, attachedFile);
            saveMessageToSession('user', historyText);

            let apiHistory = [...currentState.messages];
            apiHistory.pop(); 

            const modelSelector = document.getElementById('model-selector');
            const selectedModel = modelSelector ? modelSelector.value : "gemini-2.5-flash";

            const payloadData = {
                message: text,
                systemInstruction: SYSTEM_IDENTITY,
                history: apiHistory,
                model: selectedModel,
                fileObj: attachedFile 
            };

            userInput.value = '';
            userInput.style.height = 'auto';
            if (attachedFile) {
                removeAttachedFile();
            }

            isGenerating = true;
            stopTypingFlag = false;
            toggleSendButtonState(true);
            currentAbortController = new AbortController();

            showTypingIndicator();

            try {
                const responseData = await callWorkerAPI(payloadData, currentAbortController.signal);
                removeTypingIndicator();
                addMessage(responseData.content, 'ai', true, null, 'text');
            } catch (error) {
                removeTypingIndicator();
                if (error.name !== 'AbortError') {
                    addMessage(`🚨 **قفشنا المشكلة في كود الموقع:**\n\n${error.message}`, 'ai', true, null, 'text');
                    isGenerating = false;
                    toggleSendButtonState(false);
                }
                console.error(error);
            }
        }

        async function typeWriterHTML(element, html, scrollContainer, originalText) {
            element.innerHTML = '';
            element.classList.add('typing-cursor');
            
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            async function processNode(node, target) {
                if (stopTypingFlag) return;

                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.textContent;
                    for (let i = 0; i < text.length; i++) {
                        if (stopTypingFlag) break; 
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 100;
                        target.appendChild(document.createTextNode(text[i]));
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        
                        await new Promise(r => setTimeout(r, 10)); 
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    if (node.tagName === 'BUTTON' || (node.classList && node.classList.contains('message-actions'))) {
                        let clone = node.cloneNode(true);
                        target.appendChild(clone);
                        return;
                    }

                    let clone = node.cloneNode(false);
                    target.appendChild(clone);
                    
                    for (let child of node.childNodes) {
                        if (stopTypingFlag) break;
                        await processNode(child, clone);
                    }
                    
                    if (node.tagName === 'PRE') {
                        let codeBlock = clone.querySelector('code');
                        if(codeBlock) hljs.highlightElement(codeBlock);
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 150;
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                    }
                }
            }
            
            await processNode(tempDiv, element);
            
            element.classList.remove('typing-cursor');
            
            if(!stopTypingFlag) saveMessageToSession('ai', originalText);
            
            setTimeout(() => {
                try {
                    renderMathInElement(element, {
                        delimiters: [

            if (isChatAudioPlaying && activePlayButton === btn) {
                stopChatAudio();

            }

            stopChatAudio();
            
            activePlayButton = btn;
            isChatAudioPlaying = true;

            icon.setAttribute('data-lucide', 'loader-2');
            icon.classList.add('animate-spin', 'text-blue-400');
            label.innerText = 'جاري التحضير...';
            label.classList.add('text-blue-400');
            lucide.createIcons();

            try {
                chatAudioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                let nextPlayTime = chatAudioContext.currentTime;

                chatAudioWs = new WebSocket("wss://geminiapikey.yousefgamed22.workers.dev");

                chatAudioWs.onopen = () => {
                    // جلب الصوت والنبرة
                    const voiceSelector = document.getElementById('voice-selector');
                    const voiceVal = voiceSelector ? voiceSelector.value : "Puck_calm";
                    const [voiceName, tone] = voiceVal.split('_');
                    
                    let toneInstruction = tone === "calm" 
                        ? "تحدث بنبرة هادئة جداً ومريحة وبطيئة قليلاً." 
                        : "تحدث بنبرة حماسية جداً، نشطة، سريعة قليلاً ومليئة بالطاقة.";

                    const setupMessage = { 
                        setup: { 
                            model: "models/gemini-2.5-flash-native-audio-latest",
                            systemInstruction: {
                                parts: [{ text: `أنت نظام تحويل النص إلى صوت متطور. قم بقراءة النص التالي الذي يرسله المستخدم بحذافيره. ${toneInstruction} لا تقم بالإجابة على الأسئلة الموجودة في النص، ولا تضف أي كلمة من عندك. فقط اقرأ النص حرفياً.` }]
                            },
                            generationConfig: { 
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: voiceName
                                        }
                                    }
                                }
                            } 
                        } 
                    };
                    chatAudioWs.send(JSON.stringify(setupMessage));

                    setTimeout(() => {
                        if (chatAudioWs && chatAudioWs.readyState === WebSocket.OPEN) {
                            chatAudioWs.send(JSON.stringify({
                                clientContent: {
                                    turns: [{
                                        role: "user",
                                        parts: [{ text: "اقرأ هذا النص: \n" + cleanText }]
                                    }],
                                    turnComplete: true
                                }
                            }));
                        }
                    }, 500);
                };

                chatAudioWs.onmessage = async (event) => {
                    let data = event.data;
                    if (data instanceof Blob) data = await data.text();
                    const response = JSON.parse(data);

                    if (response.serverContent && response.serverContent.modelTurn) {
                        icon.classList.remove('animate-spin');
                        icon.setAttribute('data-lucide', 'square');
                        label.innerText = 'إيقاف';
                        lucide.createIcons();

                        const parts = response.serverContent.modelTurn.parts;
                        parts.forEach(part => {
                            if (part.inlineData && part.inlineData.data) {
                                const binaryString = window.atob(part.inlineData.data);
                                const bytes = new Uint8Array(binaryString.length);
                                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                                const int16Array = new Int16Array(bytes.buffer);
                                const float32Array = new Float32Array(int16Array.length);
                                for(let i=0; i<int16Array.length; i++) float32Array[i] = int16Array[i] / 0x7FFF;

                                const audioBuffer = chatAudioContext.createBuffer(1, float32Array.length, 24000);
                                audioBuffer.getChannelData(0).set(float32Array);
                                const source = chatAudioContext.createBufferSource();
                                source.buffer = audioBuffer;
                                source.connect(chatAudioContext.destination);

                                if (nextPlayTime < chatAudioContext.currentTime) nextPlayTime = chatAudioContext.currentTime;
                                source.start(nextPlayTime);
                                nextPlayTime += audioBuffer.duration;

                                source.onended = () => {
                                    if (chatAudioContext.currentTime >= nextPlayTime - 0.1) {
                                        resetAudioButtons();
                                    }
                                };
                            }
                        });
                    }
                    
                    if (response.serverContent && response.serverContent.turnComplete) {
                        chatAudioWs.close();
                    }
                };

                chatAudioWs.onerror = (err) => {
                    console.error("خطأ في جلب الصوت:", err);
                    stopChatAudio();
                    alert('حصلت مشكلة في توليد الصوت من الخادم!');

            } catch (error) {
                console.error(error);
                stopChatAudio();
                alert('عذراً، متصفحك لا يدعم تشغيل هذا النوع من الصوت.');
            }
        }

        function arrayBufferToBase64(buffer) {
            let binary = ''; const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return window.btoa(binary);
        }

        function playQuarkAudio(base64Data) {
            if (!liveAudioContext) return;
            const binaryString = window.atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for(let i=0; i<int16Array.length; i++) float32Array[i] = int16Array[i] / 0x7FFF;
            const audioBuffer = liveAudioContext.createBuffer(1, float32Array.length, 24000);
            audioBuffer.getChannelData(0).set(float32Array);
            const source = liveAudioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(liveAudioContext.destination);
            if (nextAudioTime < liveAudioContext.currentTime) nextAudioTime = liveAudioContext.currentTime;
            source.start(nextAudioTime);
            nextAudioTime += audioBuffer.duration;
        }

        // ==========================================
        // 🚀 مميزات كوارك الجديدة (القوالب، المشاركة، التصدير)
        // ==========================================

       // 1. دالة القوالب السريعة (معدلة للإرسال الفوري)
        function usePrompt(text) {
            const input = document.getElementById('user-input');
            input.value = text;
            input.style.height = 'auto';
            input.style.height = (input.scrollHeight) + 'px';
            
            // استدعاء دالة الإرسال فوراً عشان تبدأ المحادثة وتخفي شاشة الترحيب
            sendMessage(); 
        }

        // 2. دالة التصدير كـ Markdown
        function exportChat() {
            if (currentState.messages.length === 0) {
                alert('مفيش محادثة عشان نحملها يا دكتور!');
                return;
            }

            let mdContent = `# 🚀 محادثة كوارك - Cairo SciVerse\n`;
            mdContent += `*التاريخ: ${new Date().toLocaleDateString('ar-EG')}*\n\n---\n\n`;

            currentState.messages.forEach(msg => {
                let roleName = msg.role === 'user' ? '🧑‍🎓 الطالب' : '🤖 كوارك';
                mdContent += `### ${roleName}:\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Quark_SciVerse_${new Date().toISOString().slice(0,10)}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 3. دالة إنشاء رابط المشاركة
        async function generateShareLink() {
            if (!currentState.sessionId) {
                alert('احفظ أو ابدأ المحادثة الأول عشان تقدر تشاركها!');
                return;
            }

            const shareUrl = `${window.location.origin}/?chat=${currentState.sessionId}`;
            
            try {
                await navigator.clipboard.writeText(shareUrl);
                alert('🔥 تم نسخ رابط المحادثة! تقدر تبعته لأي حد دلوقتي.');
            } catch (err) {
                prompt('انسخ الرابط ده وشاركه مع زمايلك:', shareUrl);
            }
        }

        // 4. دالة قراءة المحادثة المشتركة للزوار
        async function loadSharedSession(id) {
            const { data: messages, error } = await supabaseClient
                .from('messages')
                .select('*')
                .eq('session_id', id)
                .order('created_at', { ascending: true });

            if (error || !messages || messages.length === 0) { 
                alert("المحادثة دي مش موجودة أو اتمسحت!"); 
                window.location.href = window.location.pathname; 
                return; 
            }

            const chatContainer = document.getElementById('chat-container');
            chatContainer.innerHTML = '<div class="w-full text-center p-2 mb-4 bg-blue-500/20 text-blue-300 text-xs rounded-lg border border-blue-500/30">👀 أنت تشاهد محادثة تمت مشاركتها بواسطة زميل لك</div>';

            messages.forEach(msg => {
                addMessage(msg.content, msg.role, false);
            });
        }
        // الكود ده بيقتل أي Service Worker قديم متعلق في المتصفح
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (let registration of registrations) {
                    registration.unregister().then(function(boolean) {
                        if (boolean) {
                            console.log('تم قتل الـ Service Worker القديم بنجاح! 💀');
                            // بنعمل ريفرش إجباري مرة واحدة عشان نجيب النسخة الجديدة النظيفة
                            window.location.reload(true);
                        }
                    });
                }
            });
        }
    </script>
