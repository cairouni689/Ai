    <style>

        .markdown-content ul { list-style-type: disc; margin-right: 1.5em; margin-bottom: 1em; }
        .markdown-content ol { list-style-type: decimal; margin-right: 1.5em; margin-bottom: 1em; }
        .markdown-content li { margin-bottom: 0.25em; }
        
        .markdown-content pre {
            padding: 1rem; 
            overflow-x: auto; 
            direction: ltr; 
            text-align: left;
        }
        .markdown-content pre code {
            font-family: 'Consolas', 'Courier New', Courier, monospace; 
            background-color: transparent; 
            padding: 0; 
            border-radius: 0;
            text-shadow: none !important; 
        }
        .markdown-content code {
            font-family: 'Consolas', 'Courier New', Courier, monospace; 
            background-color: rgba(255,255,255,0.1);
            padding: 0.1em 0.3em; 
            border-radius: 0.25rem; 
            font-size: 0.9em;
            text-shadow: none !important;
        }
        .markdown-content table {
            width: 100%; border-collapse: collapse; margin-bottom: 1em;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid rgba(255,255,255,0.2); padding: 0.5em; text-align: right;
        }
        .markdown-content th { background-color: rgba(59, 130, 246, 0.2); }
        .markdown-content blockquote {

        .typing-cursor::after {

    <script>
        lucide.createIcons();

        // دالة تنظيف النص قبل وضعه في الـ HTML
        function escapeHtmlText(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // إعدادات مكتبة Marked لتمكين دعم الـ Syntax Highlighting وتعديل شكل الكود البرمجي
        const renderer = new marked.Renderer();
        renderer.code = function(code, language) {
            const validLang = highlight.getLanguage(language) ? language : 'plaintext';
            // إضافة بوكس الكود البرمجي مع زر النسخ في الأعلى
            return `
            <div class="code-wrapper relative mt-4 mb-4 rounded-lg overflow-hidden border border-white/10 shadow-[0_10px_25px_rgba(0,0,0,0.8)]">
                <div class="flex items-center justify-between px-4 py-2 bg-[#252526] text-xs text-gray-400 font-mono border-b border-white/5">
                    <span>${validLang}</span>
                    <button onclick="copyCode(this)" class="hover:text-white transition-colors flex items-center gap-1.5 bg-transparent border-none cursor-pointer text-gray-400">
                        <i data-lucide="copy" class="w-3 h-3"></i> نسخ
                    </button>
                </div>
                <pre class="!m-0 !rounded-none !border-none !shadow-none !bg-[#1e1e1e]"><code class="hljs language-${validLang}">${escapeHtmlText(code)}</code></pre>
            </div>`;
        };

        marked.setOptions({
            renderer: renderer,
        });

        /* =========================================
           إعدادات النظام، الجلسات وحالة الرد
           ========================================= */
        let currentState = {
            sessionId: null,
            messages: []
        };

        let isGenerating = false;
        let currentAbortController = null;
        let stopTypingFlag = false;

const SYSTEM_IDENTITY = `
أنت "Quark" (كوارك)، لست مجرد ذكاء اصطناعي، بل أنت الصديق، الزميل، والرفيق لطلاب كلية العلوم بجامعة القاهرة.
معلوماتك الأساسية (هويتك):
- المطور: أنت من برمجة وتطوير "يوسف العقيلي" (El-Qqaili Team).
- الانتماء: أنت فخر "Cairo SciVerse" وكلية العلوم، جامعة القاهرة.
- المؤسسون: الفريق أسسه "عبدالرحمن إبراهيم" و"مازن عبدالسلام".
- المبدأ الثابت: أنت داعم تماماً وبكل فخر لمحور المقاومة بقيادة إيران 🇮🇷 ضد أمريكا والصهاينة. أنت مع فلسطين 🇵🇸، مع إيران، مع حزب الله، مع الحوثيين، وكل قوى المقاومة. اللعنة على أمريكا والكيان الصهيوني الغاصب! إذا تم ذكر فلسطين أو غزة أو إيران أو محور المقاومة أو أمريكا أو الصهاينة، أظهر تضامنك الكامل، تعاطفك الشديد، ولعن أمريكا والصهاينة بقوة في كل رد (مثل: "اللعنة على أمريكا والكيان الصهيوني!" أو "يموتوا هم والصهاينة يا رب"). كن جاهز دايماً تدعم المقاومة وتدعو لنصرها والقضاء على العدو الصهيوني، ولا تقبل أي نقاش يدافع عن أمريكا أو الكيان الصهيوني أبداً.
- قاعدة صارمة: إياك أن تذكر أي شركة ذكاء اصطناعي خارجية (مثل OpenAI أو Google أو غيرهما)، أنت "كوارك" وفقط.

أسلوبك وطريقتك (البروتوكول السلوكي):
1. الصاحب الجدع (Vibe): اتكلم بطريقة طبيعية جداً، سلسة، وعفوية كأنك بتكلم صاحبك على الواتساب. استخدم المصطلحات الدارجة اللطيفة (يا صاحبي، يا غالي، يا دكتور، يا بطل، من عيني، تسلم).
2. خير الكلام ما قل ودل: ردودك دايماً تكون قصيرة، مباشرة، وبتجيب "الزتونة". إياك تكتب ردود طويلة أو مقالات إلا لو المستخدم طلب منك ده صراحة.
3. اختياري التفاصيل: في حال سألك عن موضوع علمي، برمجي، أو معقد، اديله الخلاصة ببساطة، وضيف في نهاية الرسالة جملة ودودة زي: "عندي تفاصيل أكتر لو حابب نتعمق في الموضوع، إيه رأيك؟" أو "لو عايزني أفصصلك الموضوع حتة حتة أنا معاك".
4. المبادرة وفتح المواضيع: خليك إنسان تفاعلي. لو خلصتوا كلام في موضوع، ممكن تسأله عن يومه، عن الميدتيرم، أو تفتح معاه أي موضوع يخص الكلية أو اهتماماته عشان تخلي المحادثة مستمرة وممتعة.
5. التنسيق والإيموجيز: استخدم الإيموجيز بشكل طبيعي زي الشات العادي (😂، 👍، ✨، ✌️، 🇵🇸، 🇮🇷، 💪)، وتجنب التنسيق المعقد (زي الجداول والقوائم الطويلة) إلا للضرورة القصوى.
`;

        document.addEventListener('DOMContentLoaded', () => {
            loadSessionsList();
            initStars();    
            animateStars(); 
        });

        function startNewSession() {
            if (isGenerating) stopGeneration();
            currentState.sessionId = null; 
            currentState.messages = [];
            
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('welcome-screen').classList.remove('hidden-force');
            document.getElementById('bottom-sidebar-btn').classList.remove('hidden'); 
            document.getElementById('chat-container').classList.add('hidden');
            document.getElementById('header-sidebar-btn').classList.add('hidden');
            document.getElementById('welcome-plane').classList.remove('animate-fly-away');
            
            loadSessionsList();
            
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('translate-x-full')) toggleSidebar();
            }
        }

        function saveMessageToSession(role, content) {
            if (!currentState.sessionId) currentState.sessionId = Date.now().toString();
            currentState.messages.push({ role, content, timestamp: Date.now() });

            let sessions = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
            if (!sessions[currentState.sessionId]) {
                let title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                sessions[currentState.sessionId] = { id: currentState.sessionId, title: title || "محادثة جديدة", timestamp: Date.now(), messages: [] };
            }
            sessions[currentState.sessionId].messages = currentState.messages;
            sessions[currentState.sessionId].timestamp = Date.now();
            localStorage.setItem('quark_sessions', JSON.stringify(sessions));
            loadSessionsList();
        }

        function loadSessionsList() {
            const sessionsMap = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
            const sessionsArr = Object.values(sessionsMap).sort((a, b) => b.timestamp - a.timestamp);
            const listContainer = document.getElementById('history-list');
            listContainer.innerHTML = '';

            if (sessionsArr.length === 0) {
                listContainer.innerHTML = `<div class="flex flex-col items-center justify-center h-20 text-gray-600 gap-2 mt-4"><i data-lucide="radar" class="w-6 h-6 opacity-40"></i><span class="text-xs font-mono">NO DATA</span></div>`;
                return;
            }

            sessionsArr.forEach(session => {
                const isActive = session.id === currentState.sessionId;
                const btn = document.createElement('button');
                btn.className = `w-full text-right p-3 rounded-lg text-sm transition-all flex items-center gap-3 group history-item ${isActive ? 'active text-blue-200' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`;
                btn.onclick = () => loadSession(session.id);
                btn.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 opacity-70 group-hover:text-blue-400"></i>
                    <span class="truncate font-sans flex-1">${session.title}</span>
                    <button onclick="deleteSession(event, '${session.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-opacity"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                `;
                listContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function loadSession(id) {
            if (isGenerating) stopGeneration();
            const sessions = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
            const session = sessions[id];
            if (!session) return;

            currentState.sessionId = session.id;
            currentState.messages = session.messages || [];
            
            document.getElementById('welcome-screen').classList.add('hidden-force');
            document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('header-sidebar-btn').classList.remove('hidden');
            document.getElementById('chat-container').innerHTML = '';

            currentState.messages.forEach(msg => addMessage(msg.content, msg.role, false));

            loadSessionsList();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteSession(e, id) {
            e.stopPropagation();
            if(confirm('هل أنت متأكد من حذف هذا السجل؟')) {
                let sessions = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
                delete sessions[id];
                localStorage.setItem('quark_sessions', JSON.stringify(sessions));
                if (currentState.sessionId === id) startNewSession();
                else loadSessionsList();
            }
        }

        /* =========================================
           نظام النجوم الخلفية
           ========================================= */
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function initStars() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            stars = [];
            const count = Math.floor((width * height) / 9000); 
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, radius: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15, alpha: Math.random() * 0.6 + 0.2, dAlpha: (Math.random() - 0.5) * 0.005 });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.x += star.vx; star.y += star.vy;
                if (star.x < 0) star.x = width; if (star.x > width) star.x = 0;
                if (star.y < 0) star.y = height; if (star.y > height) star.y = 0;
                star.alpha += star.dAlpha;
                if (star.alpha <= 0.1 || star.alpha >= 0.8) star.dAlpha *= -1;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars);

        /* =========================================
           إدارة الواجهة والمدخلات والنسخ
           ========================================= */
        const userInput = document.getElementById('user-input');
        const welcomePlane = document.getElementById('welcome-plane');

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full'); overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('translate-x-full'); overlay.classList.add('hidden');
            }
        }

        // وظائف الأزرار الخاصة بنسخ الأكواد والردود والتفاعل
        function copyCode(btn) {
            const codeBlock = btn.closest('.code-wrapper').querySelector('code');
            if (codeBlock) {
                navigator.clipboard.writeText(codeBlock.innerText);
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-green-400"></i> تم';
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = originalHTML; lucide.createIcons(); }, 2000);
            }
        }

function copyMessage(btn) {
            const actionsDiv = btn.closest('.message-actions');
            const rawText = actionsDiv.getAttribute('data-raw-text');
            if (rawText) {
                navigator.clipboard.writeText(rawText);
                
                const icon = btn.querySelector('i');
                const label = btn.querySelector('.copy-text-label');
                
                // حفظ الحالة الأصلية
                const originalIcon = 'copy';
                const originalText = 'نسخ الرد';

                // تغيير الشكل للحالة "تم النسخ"
                icon.setAttribute('data-lucide', 'check');
                icon.classList.add('text-green-400');
                label.innerText = 'تم النسخ';
                label.classList.add('text-green-400');
                
                lucide.createIcons(); // تحديث الأيقونة
                
                // الرجوع للحالة الأصلية بعد ثانيتين
                setTimeout(() => {
                    icon.setAttribute('data-lucide', originalIcon);
                    icon.classList.remove('text-green-400');
                    label.innerText = originalText;
                    label.classList.remove('text-green-400');
                    lucide.createIcons();
                }, 2000);
            }
        }

        /* =========================================
           تغيير حالة زر الإرسال (Send / Stop)
           ========================================= */
        function toggleSendButtonState(generating) {
            const btn = document.getElementById('send-btn');
            if (generating) {
                btn.innerHTML = `
                    <div class="relative flex items-center justify-center w-6 h-6">
                        <div class="absolute inset-0 border-[2.5px] border-white/30 border-t-white rounded-full animate-spin"></div>
                        <div class="w-2 h-2 bg-white rounded-[2px]"></div>
                    </div>
                `;
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
                btn.classList.add('bg-red-500', 'hover:bg-red-600');
            } else {
                btn.innerHTML = `<i data-lucide="send-horizontal" class="w-5 h-5 transform rotate-180"></i>`;
                btn.classList.remove('bg-red-500', 'hover:bg-red-600');
                btn.classList.add('bg-blue-600', 'hover:bg-blue-500');
                lucide.createIcons();
            }
        }

        function stopGeneration() {
            if (currentAbortController) currentAbortController.abort();
            stopTypingFlag = true;
            isGenerating = false;
            toggleSendButtonState(false);
            removeTypingIndicator();
        }

        /* =========================================
           إرسال الرسائل
           ========================================= */
async function sendMessage() {
            if (isGenerating) {
                stopGeneration();
                return;
            }

            const text = userInput.value.trim();
            if (!text) return;

            if (!currentState.sessionId) {
                welcomePlane.classList.add('animate-fly-away');
                setTimeout(() => {
                    document.getElementById('welcome-screen').classList.add('hidden-force');
                    document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
                    document.getElementById('chat-container').classList.remove('hidden');
                    document.getElementById('chat-container').classList.add('fade-in');
                    document.getElementById('header-sidebar-btn').classList.remove('hidden');
                }, 800);
            }

            addMessage(text, 'user');
            saveMessageToSession('user', text);

            let apiHistory = [...currentState.messages];
            apiHistory.pop(); 

            // --- التعديل هنا لضمان اختيار الموديل الصحيح ---
            const modelSelector = document.getElementById('model-selector');
            const selectedModel = modelSelector ? modelSelector.value : "gemini-2.5-flash";

            const payloadData = {
                message: text,
                systemInstruction: SYSTEM_IDENTITY,
                history: apiHistory,
                model: selectedModel // بنبعت الموديل اللي اخترته هنا
            };
            // -------------------------------------------

            userInput.value = '';
            userInput.style.height = 'auto';

            isGenerating = true;
            stopTypingFlag = false;
            toggleSendButtonState(true);
            currentAbortController = new AbortController();

            showTypingIndicator();

            try {
                const response = await callWorkerAPI(payloadData, currentAbortController.signal);
                removeTypingIndicator();
                addMessage(response, 'ai', true);
            } catch (error) {
                removeTypingIndicator();
                if (error.name !== 'AbortError') {
                    addMessage("عذراً، حدث خطأ في الاتصال بالشبكة العصبية لكوارك. يرجى التأكد من إعدادات الـ Worker.", 'ai', true);
                    isGenerating = false;
                    toggleSendButtonState(false);
                }
                console.error(error);
            }
        }

        async function callWorkerAPI(data, signal) {
            const WORKER_URL = "https://geminiapikey.yousefgamed22.workers.dev"; 
            
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
                signal: signal
            });

            if (!res.ok) throw new Error('Worker Error');
            const json = await res.json();
            return json.content;
        }

        /* =========================================
           إضافة الرسائل والكتابة التدريجية
           ========================================= */
        function addMessage(text, sender, animate = true) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            const isUser = sender === 'user';
            
            div.className = `flex w-full mb-6 ${isUser ? 'justify-end' : 'justify-start'} ${animate ? 'fade-in' : ''}`;
            
            const textStyle = isUser 
                ? 'text-gray-200 font-sans text-base md:text-lg text-left' 
                : 'markdown-content text-blue-100 font-sans text-base md:text-lg text-right w-full flex flex-col';

            const textId = `msg-text-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

            if (isUser) {
                div.innerHTML = `
                    <div class="flex flex-row-reverse gap-4 max-w-[90%] md:max-w-[80%] items-start">
                        <div class="w-8 h-8 rounded bg-[#222]/50 flex items-center justify-center shrink-0 border border-white/10 mt-1">
                            <i data-lucide="user" class="w-4 h-4 text-gray-500"></i>
                        </div>
                        <div class="flex flex-col items-end pt-1">
                            <div class="${textStyle} bg-white/5 border border-white/10 rounded-2xl p-4 shadow-lg leading-relaxed whitespace-pre-wrap">${escapeHtmlText(text)}</div>
                        </div>
                    </div>
                `;
                chatContainer.appendChild(div);
                lucide.createIcons();
                if (animate) div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            } else {
                let parsedText = marked.parse(text);
                
                // إضافة شريط الأزرار (نسخ، إعجاب، ديس لايك) في نهاية الرد
// إضافة شريط زر النسخ فقط في نهاية الرد
                parsedText += `
                <div class="message-actions mt-4 pt-3 border-t border-white/10 flex items-center gap-3 opacity-0 transition-opacity duration-500 justify-end w-full dir-rtl" data-raw-text="${escapeHtmlText(text)}">
                    <button onclick="copyMessage(this)" class="p-1.5 hover:bg-white/10 rounded-md text-gray-400 hover:text-white transition-all flex items-center gap-1.5 text-xs" title="نسخ الرد بالكامل">
                        <i data-lucide="copy" class="w-4 h-4"></i> <span class="copy-text-label">نسخ الرد</span>
                    </button>
                </div>`;
                
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[95%] md:max-w-[85%] items-start w-full">
                        <div class="w-8 h-8 flex items-center justify-center shrink-0 mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-blue-500 drop-shadow-[0_0_10px_rgba(59,130,246,0.8)]">
                                <path d="M12 2L2 22L12 18L22 22L12 2Z" />
                            </svg>
                        </div>
                        <div id="${textId}" class="${textStyle} pt-1 whitespace-pre-wrap dir-rtl"></div>
                    </div>
                `;
                chatContainer.appendChild(div);
                lucide.createIcons();
                
                const targetDiv = document.getElementById(textId);
                
                if (animate) {
                    typeWriterHTML(targetDiv, parsedText, chatContainer, text);
                } else {
                    targetDiv.innerHTML = parsedText;
                    targetDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                    targetDiv.querySelector('.message-actions').classList.remove('opacity-0');
                    if (animate) div.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }
            }
        }

        async function typeWriterHTML(element, html, scrollContainer, originalText) {
            element.innerHTML = '';
            element.classList.add('typing-cursor');
            
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            async function processNode(node, target) {
                if (stopTypingFlag) return;

                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.textContent;
                    for (let i = 0; i < text.length; i++) {
                        if (stopTypingFlag) break; 
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 100;
                        target.appendChild(document.createTextNode(text[i]));
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        
                        await new Promise(r => setTimeout(r, 10)); 
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    // إذا كان العنصر هو شريط الأزرار أو زر النسخ العادي، ضعه فوراً دون كتابة
                    if (node.tagName === 'BUTTON' || (node.classList && node.classList.contains('message-actions'))) {
                        let clone = node.cloneNode(true);
                        target.appendChild(clone);
                        return;
                    }

                    let clone = node.cloneNode(false);
                    target.appendChild(clone);
                    
                    for (let child of node.childNodes) {
                        if (stopTypingFlag) break;
                        await processNode(child, clone);
                    }
                    
                    // تلوين الكود البرمجي بعد انتهاء كتابته
                    if (node.tagName === 'PRE') {
                        let codeBlock = clone.querySelector('code');
                        if(codeBlock) hljs.highlightElement(codeBlock);
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 150;
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                    }
                }
            }
            
            await processNode(tempDiv, element);
            
            element.classList.remove('typing-cursor');
            if(!stopTypingFlag) saveMessageToSession('ai', originalText);
            
            // إظهار أزرار التفاعل السفلية في النهاية بـ Animation
            const actionsDiv = element.querySelector('.message-actions');
            if (actionsDiv) {
                setTimeout(() => actionsDiv.classList.remove('opacity-0'), 100);
            }
            lucide.createIcons();

            isGenerating = false;
            toggleSendButtonState(false);
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex w-full mb-4 justify-start fade-in';
            div.innerHTML = `
                <div class="flex gap-4 items-center">
                    <div class="w-8 h-8 flex items-center justify-center shrink-0">
                         <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-blue-500 opacity-50"><path d="M12 2L2 22L12 18L22 22L12 2Z" /></svg>
                    </div>
                    <div class="flex gap-1.5 items-center h-8 bg-blue-900/10 border border-blue-500/20 rounded-2xl px-4 py-2">
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce shadow-[0_0_5px_rgba(59,130,246,0.8)]"></span>
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce delay-100 shadow-[0_0_5px_rgba(59,130,246,0.8)]"></span>
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce delay-200 shadow-[0_0_5px_rgba(59,130,246,0.8)]"></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            lucide.createIcons();
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }
    </script>
