<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quark - Cairo SciVerse</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        quark: {
                            primary: '#3b82f6',
                            accent: '#60a5fa',
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fly-away': 'flyUp 1.2s ease-in-out forwards',
                    },
                    keyframes: {
                        flyUp: {
                            '0%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                            '40%': { transform: 'translateY(-50px) scale(1.1)', opacity: '1' },
                            '100%': { transform: 'translateY(-800px) scale(0.2)', opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            overflow: hidden; 
        }

        #space-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000000;
        }

        .glass-sidebar {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }

        .transparent-header {
            background: transparent;
        }

        #main-content-area {
            mask-image: linear-gradient(to bottom, transparent 80px, black 120px);
            -webkit-mask-image: linear-gradient(to bottom, transparent 80px, black 120px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-force {
            display: none !important;
        }

        .history-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-right: 2px solid #3b82f6;
        }

        .markdown-content {
            line-height: 1.8;
            font-size: 1.05rem;
        }
        .markdown-content p, .markdown-content li, .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.3);
        }
        .markdown-content p { margin-bottom: 1em; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            font-weight: bold; margin-top: 1.5em; margin-bottom: 0.5em; color: #60a5fa;
        }
        .markdown-content h1 { font-size: 1.5em; }
        .markdown-content h2 { font-size: 1.3em; }
        .markdown-content ul { list-style-type: disc; margin-right: 1.5em; margin-bottom: 1em; }
        .markdown-content ol { list-style-type: decimal; margin-right: 1.5em; margin-bottom: 1em; }
        .markdown-content li { margin-bottom: 0.25em; }
        
        .markdown-content pre {
            background-color: #1e1e1e !important; 
            border-radius: 0.5rem; 
            padding: 1rem; 
            margin-bottom: 1em;
            overflow-x: auto; 
            direction: ltr; 
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .markdown-content pre code {
            font-family: 'Consolas', 'Courier New', Courier, monospace; 
            background-color: transparent; 
            padding: 0; 
            border-radius: 0;
            text-shadow: none !important; 
        }
        .markdown-content code {
            font-family: 'Consolas', 'Courier New', Courier, monospace; 
            background-color: rgba(255,255,255,0.1);
            padding: 0.1em 0.3em; 
            border-radius: 0.25rem; 
            font-size: 0.9em;
            text-shadow: none !important;
        }
        .markdown-content table {
            width: 100%; border-collapse: collapse; margin-bottom: 1em;
        }
        .markdown-content th, .markdown-content td {
            border: 1px solid rgba(255,255,255,0.2); padding: 0.5em; text-align: right;
        }
        .markdown-content th { background-color: rgba(59, 130, 246, 0.2); }
        .markdown-content blockquote {
            border-right: 4px solid #3b82f6; padding-right: 1em; margin-bottom: 1em; color: #9ca3af;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
        }
        
        .typing-cursor::after {
            content: '▋';
            display: inline-block;
            margin-right: 4px;
            animation: blink 1s step-end infinite;
            color: #60a5fa;
            text-shadow: 0 0 10px #60a5fa;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body class="h-screen flex flex-col font-sans selection:bg-quark-primary selection:text-white">

    <canvas id="space-canvas"></canvas>

    <header class="fixed top-0 w-full z-50 transparent-header h-20 flex items-center px-6 justify-between pointer-events-none">
        <div class="flex items-center gap-3 pointer-events-auto">
            <div class="w-10 h-10 flex items-center justify-center">
               <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-blue-500 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]">
                    <path d="M12 2L2 22L12 18L22 22L12 2Z" />
                </svg>
            </div>
            <div class="flex flex-col">
                <h1 class="text-xl font-bold tracking-widest text-white leading-tight font-mono drop-shadow-md">QUARK</h1>
                <span class="text-[10px] text-gray-400 font-normal tracking-[0.2em] uppercase">Cairo SciVerse</span>
            </div>
        </div>

        <button id="header-sidebar-btn" onclick="toggleSidebar()" class="hidden pointer-events-auto p-2 text-gray-400 hover:text-white hover:bg-white/5 rounded-full transition-colors">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </header>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/80 z-[60] hidden transition-opacity backdrop-blur-sm"></div>
    <aside id="sidebar" class="fixed top-0 right-0 h-full w-80 glass-sidebar transform translate-x-full transition-transform duration-300 z-[70] flex flex-col bg-black/90">
        <div class="p-5 border-b border-white/5 flex justify-between items-center">
            <span class="font-bold text-lg text-white tracking-wide">Quark Control</span>
            <button onclick="toggleSidebar()" class="p-1 hover:bg-white/10 rounded text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        
        <div class="p-4 border-b border-white/5">
            <button onclick="startNewSession()" class="w-full py-2.5 mb-4 bg-blue-600/20 hover:bg-blue-600/30 border border-blue-500/30 rounded-lg text-sm flex items-center justify-center gap-2 transition-all text-blue-200 hover:text-white shadow-[0_0_10px_rgba(37,99,235,0.1)]">
                <i data-lucide="plus" class="w-4 h-4"></i> شات جديد
            </button>
        </div>

        <div class="p-2 bg-black/50 text-[10px] text-gray-500 uppercase tracking-widest text-center py-1">Mission Log</div>
        
        <div id="history-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
            <div class="flex flex-col items-center justify-center h-20 text-gray-600 gap-2 mt-4">
                <i data-lucide="radar" class="w-6 h-6 opacity-40"></i>
                <span class="text-xs font-mono">NO DATA</span>
            </div>
        </div>

        <div class="p-6 border-t border-white/5 bg-black/40 text-center mt-auto">
            <h3 class="text-lg font-bold text-white font-mono tracking-wider drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">AI SciVerse</h3>
            <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mt-1 font-light">Faculty of Science</p>
        </div>
    </aside>

    <main id="main-content-area" class="flex-1 flex flex-col relative w-full max-w-5xl mx-auto h-full z-10">
        
        <div id="welcome-screen" class="absolute inset-0 top-0 flex flex-col items-center justify-center p-6 pb-40 transition-all duration-500 z-20">
            <div id="welcome-logo-container" class="mb-10 relative group cursor-default">
                <div class="absolute -inset-10 bg-blue-500/10 rounded-full blur-3xl animate-pulse-slow"></div>
                <svg id="welcome-plane" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-40 h-40 text-white drop-shadow-[0_0_20px_rgba(59,130,246,0.6)] transition-transform duration-700">
                    <path d="M12 2L1 21L12 17L23 21L12 2Z" />
                </svg>
            </div>
            
            <h2 class="text-5xl md:text-7xl font-bold text-center mb-6 tracking-tighter text-white drop-shadow-2xl font-mono">QUARK</h2>
            <p class="text-gray-400 text-center max-w-lg text-lg tracking-[0.05em] font-light">SciVerse Intelligence - Cairo University</p>
        </div>

        <div id="chat-container" class="hidden flex-1 overflow-y-auto w-full px-4 pt-20 pb-48 custom-scrollbar scroll-smooth relative z-10"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 w-full z-40 bg-gradient-to-t from-black via-black/95 to-transparent pt-4 pb-6 px-4">
        <div class="max-w-3xl mx-auto flex items-end gap-2">
            
            <button id="bottom-sidebar-btn" onclick="toggleSidebar()" class="p-3 bg-[#1e1e1e] hover:bg-white/10 text-gray-400 hover:text-white rounded-full transition-all shadow-lg border border-white/5 group mb-8">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
            </button>

            <div class="flex-1 relative">
                
                <div class="rounded-[2rem] flex items-end p-2 bg-[#1e1e1e] border border-white/10 transition-all duration-300 focus-within:border-blue-500/50 focus-within:shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                    
                    <div class="pl-2"></div>

                    <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none focus:ring-0 text-white placeholder-gray-500 resize-none py-3 px-3 max-h-32 text-base leading-relaxed font-sans" placeholder="تحدث مع كوارك..."></textarea>

                    <button onclick="sendMessage()" id="send-btn" class="p-2.5 bg-blue-600 hover:bg-blue-500 text-white rounded-full shadow-lg transition-all flex items-center justify-center ml-1 w-11 h-11 shrink-0">
                        <i data-lucide="send-horizontal" class="w-5 h-5 transform rotate-180"></i>
                    </button>
                </div>

                <div class="text-center mt-3">
                    <p class="text-[11px] text-gray-500 font-normal">
                        Quark - Powered by Cairo SciVerse | Faculty of Science
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        marked.setOptions({
            highlight: function(code, lang) {
                const language = highlight.getLanguage(lang) ? lang : 'plaintext';
                return highlight.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        /* =========================================
           إعدادات النظام، الجلسات وحالة الرد
           ========================================= */
        let currentState = {
            sessionId: null,
            messages: []
        };

        // متغيرات للتحكم في الإيقاف والتشغيل
        let isGenerating = false;
        let currentAbortController = null;
        let stopTypingFlag = false;

        const SYSTEM_IDENTITY = `
أنت "Quark" (كوارك)، مساعد ذكي وأسطوري متطور جداً.

التعليمات الأساسية والصارمة:
1. المطورون: تم تصميمك وتطويرك بالكامل بواسطة المبرمج العبقري "يوسف العقيلي" وفريق "Cairo SciVerse".
2. الانتماء: أنت تنتمي حصرياً لكلية العلوم جامعة القاهرة. لا تذكر أبداً أي علاقة بشركات أخرى (مثل جوجل، ميتا، أوبن إي آي). أنت كيان مستقل وخاص بفريق Cairo SciVerse.
3. المؤسسون: "عبدالرحمن ابراهيم" و "مازن عبدالسلام" هم مؤسسو الفريق.
4. أسلوب الرد:
   - يجب أن تكون ردودك عملية جداً، دقيقة، مفصلة، ومرتبة.
   - استخدم دائماً تنسيق الماركداون (Markdown) لتنظيم إجاباتك.
   - تحدث بأسلوب احترافي جداً وودود في نفس الوقت.
5. إذا سألك المستخدم "من أنت؟" أو "من صنعك؟": قل بكل فخر أنك كوارك، المساعد الذكي الخاص بكلية العلوم جامعة القاهرة، من برمجة وتطوير يوسف العقيلي وفريق Cairo SciVerse.
`;

        document.addEventListener('DOMContentLoaded', () => {
            loadSessionsList();
            initStars();    
            animateStars(); 
        });

        function startNewSession() {
            if (isGenerating) stopGeneration();
            currentState.sessionId = null; 
            currentState.messages = [];
            
            document.getElementById('chat-container').innerHTML = '';
            document.getElementById('welcome-screen').classList.remove('hidden-force');
            document.getElementById('bottom-sidebar-btn').classList.remove('hidden'); 
            document.getElementById('chat-container').classList.add('hidden');
            document.getElementById('header-sidebar-btn').classList.add('hidden');
            document.getElementById('welcome-plane').classList.remove('animate-fly-away');
            
            loadSessionsList();
            
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                if (!sidebar.classList.contains('translate-x-full')) toggleSidebar();
            }
        }

        // حفظ وحمل الجلسات
        function saveMessageToSession(role, content) {
            if (!currentState.sessionId) currentState.sessionId = Date.now().toString();
            currentState.messages.push({ role, content, timestamp: Date.now() });

            let sessions = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
            if (!sessions[currentState.sessionId]) {
                let title = content.substring(0, 30) + (content.length > 30 ? '...' : '');
                sessions[currentState.sessionId] = { id: currentState.sessionId, title: title || "محادثة جديدة", timestamp: Date.now(), messages: [] };
            }
            sessions[currentState.sessionId].messages = currentState.messages;
            sessions[currentState.sessionId].timestamp = Date.now();
            localStorage.setItem('quark_sessions', JSON.stringify(sessions));
            loadSessionsList();
        }

        function loadSessionsList() {
            const sessionsMap = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
            const sessionsArr = Object.values(sessionsMap).sort((a, b) => b.timestamp - a.timestamp);
            const listContainer = document.getElementById('history-list');
            listContainer.innerHTML = '';

            if (sessionsArr.length === 0) {
                listContainer.innerHTML = `<div class="flex flex-col items-center justify-center h-20 text-gray-600 gap-2 mt-4"><i data-lucide="radar" class="w-6 h-6 opacity-40"></i><span class="text-xs font-mono">NO DATA</span></div>`;
                return;
            }

            sessionsArr.forEach(session => {
                const isActive = session.id === currentState.sessionId;
                const btn = document.createElement('button');
                btn.className = `w-full text-right p-3 rounded-lg text-sm transition-all flex items-center gap-3 group history-item ${isActive ? 'active text-blue-200' : 'text-gray-400 hover:bg-white/5 hover:text-white'}`;
                btn.onclick = () => loadSession(session.id);
                btn.innerHTML = `
                    <i data-lucide="message-square" class="w-4 h-4 opacity-70 group-hover:text-blue-400"></i>
                    <span class="truncate font-sans flex-1">${session.title}</span>
                    <button onclick="deleteSession(event, '${session.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-opacity"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                `;
                listContainer.appendChild(btn);
            });
            lucide.createIcons();
        }

        function loadSession(id) {
            if (isGenerating) stopGeneration();
            const sessions = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
            const session = sessions[id];
            if (!session) return;

            currentState.sessionId = session.id;
            currentState.messages = session.messages || [];
            
            document.getElementById('welcome-screen').classList.add('hidden-force');
            document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('header-sidebar-btn').classList.remove('hidden');
            document.getElementById('chat-container').innerHTML = '';

            currentState.messages.forEach(msg => addMessage(msg.content, msg.role, false));

            loadSessionsList();
            if (window.innerWidth < 768) toggleSidebar();
        }

        function deleteSession(e, id) {
            e.stopPropagation();
            if(confirm('هل أنت متأكد من حذف هذا السجل؟')) {
                let sessions = JSON.parse(localStorage.getItem('quark_sessions') || '{}');
                delete sessions[id];
                localStorage.setItem('quark_sessions', JSON.stringify(sessions));
                if (currentState.sessionId === id) startNewSession();
                else loadSessionsList();
            }
        }

        /* =========================================
           نظام النجوم الخلفية
           ========================================= */
        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function initStars() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            stars = [];
            const count = Math.floor((width * height) / 9000); 
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, radius: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15, alpha: Math.random() * 0.6 + 0.2, dAlpha: (Math.random() - 0.5) * 0.005 });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.x += star.vx; star.y += star.vy;
                if (star.x < 0) star.x = width; if (star.x > width) star.x = 0;
                if (star.y < 0) star.y = height; if (star.y > height) star.y = 0;
                star.alpha += star.dAlpha;
                if (star.alpha <= 0.1 || star.alpha >= 0.8) star.dAlpha *= -1;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars);

        /* =========================================
           إدارة الواجهة والمدخلات
           ========================================= */
        const userInput = document.getElementById('user-input');
        const welcomePlane = document.getElementById('welcome-plane');

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full'); overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('translate-x-full'); overlay.classList.add('hidden');
            }
        }

        /* =========================================
           تغيير حالة زر الإرسال (Send / Stop)
           ========================================= */
        function toggleSendButtonState(generating) {
            const btn = document.getElementById('send-btn');
            if (generating) {
                // شكل زر التوقف والدايرة اللي بتلف
                btn.innerHTML = `
                    <div class="relative flex items-center justify-center w-6 h-6">
                        <div class="absolute inset-0 border-[2.5px] border-white/30 border-t-white rounded-full animate-spin"></div>
                        <div class="w-2 h-2 bg-white rounded-[2px]"></div>
                    </div>
                `;
                btn.classList.remove('bg-blue-600', 'hover:bg-blue-500');
                btn.classList.add('bg-red-500', 'hover:bg-red-600');
            } else {
                // شكل زر الإرسال الأفقي
                btn.innerHTML = `<i data-lucide="send-horizontal" class="w-5 h-5 transform rotate-180"></i>`;
                btn.classList.remove('bg-red-500', 'hover:bg-red-600');
                btn.classList.add('bg-blue-600', 'hover:bg-blue-500');
                lucide.createIcons();
            }
        }

        // إيقاف الرد يدوياً
        function stopGeneration() {
            if (currentAbortController) currentAbortController.abort();
            stopTypingFlag = true;
            isGenerating = false;
            toggleSendButtonState(false);
            removeTypingIndicator();
        }

        /* =========================================
           إرسال الرسائل
           ========================================= */
        async function sendMessage() {
            // لو شغال وبيدوس على الزرار، يبقى عايز يوقف
            if (isGenerating) {
                stopGeneration();
                return;
            }

            const text = userInput.value.trim();
            if (!text) return;

            if (!currentState.sessionId) {
                welcomePlane.classList.add('animate-fly-away');
                setTimeout(() => {
                    document.getElementById('welcome-screen').classList.add('hidden-force');
                    document.getElementById('bottom-sidebar-btn').classList.add('hidden'); 
                    document.getElementById('chat-container').classList.remove('hidden');
                    document.getElementById('chat-container').classList.add('fade-in');
                    document.getElementById('header-sidebar-btn').classList.remove('hidden');
                }, 800);
            }

            addMessage(text, 'user');
            saveMessageToSession('user', text);

            let apiHistory = [...currentState.messages];
            apiHistory.pop(); 

            const payloadData = {
                message: text,
                systemInstruction: SYSTEM_IDENTITY,
                history: apiHistory 
            };

            userInput.value = '';
            userInput.style.height = 'auto';

            // تفعيل حالة التحميل
            isGenerating = true;
            stopTypingFlag = false;
            toggleSendButtonState(true);
            currentAbortController = new AbortController();

            showTypingIndicator();

            try {
                const response = await callWorkerAPI(payloadData, currentAbortController.signal);
                removeTypingIndicator();
                addMessage(response, 'ai', true);
            } catch (error) {
                removeTypingIndicator();
                if (error.name === 'AbortError') {
                    // تم الإيقاف يدوياً من المستخدم، لا نفعل شيء
                } else {
                    addMessage("عذراً، حدث خطأ في الاتصال بالشبكة العصبية لكوارك. يرجى التأكد من إعدادات الـ Worker.", 'ai', true);
                    isGenerating = false;
                    toggleSendButtonState(false);
                }
                console.error(error);
            }
        }

        async function callWorkerAPI(data, signal) {
            const WORKER_URL = "https://geminiapikey.yousefgamed22.workers.dev"; 
            
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data),
                signal: signal
            });

            if (!res.ok) throw new Error('Worker Error');
            const json = await res.json();
            return json.content;
        }

        /* =========================================
           إضافة الرسائل والكتابة التدريجية والاسكرول
           ========================================= */
        function addMessage(text, sender, animate = true) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            const isUser = sender === 'user';
            
            div.className = `flex w-full mb-6 ${isUser ? 'justify-end' : 'justify-start'} ${animate ? 'fade-in' : ''}`;
            
            const textStyle = isUser 
                ? 'text-gray-200 font-sans text-base md:text-lg text-left' 
                : 'markdown-content text-blue-100 font-sans text-base md:text-lg text-right w-full';

            const textId = `msg-text-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;

            if (isUser) {
                div.innerHTML = `
                    <div class="flex flex-row-reverse gap-4 max-w-[90%] md:max-w-[80%] items-start">
                        <div class="w-8 h-8 rounded bg-[#222]/50 flex items-center justify-center shrink-0 border border-white/10 mt-1">
                            <i data-lucide="user" class="w-4 h-4 text-gray-500"></i>
                        </div>
                        <div class="flex flex-col items-end pt-1">
                            <div class="${textStyle} bg-white/5 border border-white/10 rounded-2xl p-4 shadow-lg leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</div>
                        </div>
                    </div>
                `;
                chatContainer.appendChild(div);
                lucide.createIcons();
                if (animate) div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            } else {
                const parsedText = marked.parse(text);
                
                div.innerHTML = `
                    <div class="flex gap-4 max-w-[95%] md:max-w-[85%] items-start">
                        <div class="w-8 h-8 flex items-center justify-center shrink-0 mt-1">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-8 h-8 text-blue-500 drop-shadow-[0_0_10px_rgba(59,130,246,0.8)]">
                                <path d="M12 2L2 22L12 18L22 22L12 2Z" />
                            </svg>
                        </div>
                        <div id="${textId}" class="${textStyle} pt-1 whitespace-pre-wrap dir-rtl"></div>
                    </div>
                `;
                chatContainer.appendChild(div);
                lucide.createIcons();
                
                const targetDiv = document.getElementById(textId);
                
                if (animate) {
                    typeWriterHTML(targetDiv, parsedText, chatContainer, text);
                } else {
                    targetDiv.innerHTML = parsedText;
                    targetDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
                    if (animate) div.scrollIntoView({ behavior: 'smooth', block: 'end' });
                }
            }
        }

        async function typeWriterHTML(element, html, scrollContainer, originalText) {
            element.innerHTML = '';
            element.classList.add('typing-cursor');
            
            let tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            async function processNode(node, target) {
                if (stopTypingFlag) return; // الخروج لو المستخدم عمل إيقاف

                if (node.nodeType === Node.TEXT_NODE) {
                    let text = node.textContent;
                    for (let i = 0; i < text.length; i++) {
                        if (stopTypingFlag) break; 
                        
                        // الاسكرول الذكي: بنشوف هل المستخدم تحت خالص ولا عمل سكرول لفوق؟
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 100;
                        
                        target.appendChild(document.createTextNode(text[i]));
                        
                        // لو المستخدم تحت، ننزله مع الكتابة.. لو طلع يقرا فوق، نسيبه براحته
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        
                        await new Promise(r => setTimeout(r, 10)); 
                    }
                } else if (node.nodeType === Node.ELEMENT_NODE) {
                    let clone = node.cloneNode(false);
                    target.appendChild(clone);
                    
                    if (node.tagName === 'PRE') {
                        clone.innerHTML = node.innerHTML; 
                        let codeBlock = clone.querySelector('code');
                        if(codeBlock) hljs.highlightElement(codeBlock);
                        
                        const isAtBottom = scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 150;
                        if (isAtBottom) scrollContainer.scrollTop = scrollContainer.scrollHeight;
                        
                        await new Promise(r => setTimeout(r, 80)); 
                    } else {
                        for (let child of node.childNodes) {
                            if (stopTypingFlag) break;
                            await processNode(child, clone);
                        }
                    }
                }
            }
            
            await processNode(tempDiv, element);
            
            // إنهاء الكتابة وحفظ الرد
            element.classList.remove('typing-cursor');
            if(!stopTypingFlag) saveMessageToSession('ai', originalText);
            
            isGenerating = false;
            toggleSendButtonState(false);
        }

        function showTypingIndicator() {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex w-full mb-4 justify-start fade-in';
            div.innerHTML = `
                <div class="flex gap-4 items-center">
                    <div class="w-8 h-8 flex items-center justify-center shrink-0">
                         <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-blue-500 opacity-50"><path d="M12 2L2 22L12 18L22 22L12 2Z" /></svg>
                    </div>
                    <div class="flex gap-1.5 items-center h-8 bg-blue-900/10 border border-blue-500/20 rounded-2xl px-4 py-2">
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce shadow-[0_0_5px_rgba(59,130,246,0.8)]"></span>
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce delay-100 shadow-[0_0_5px_rgba(59,130,246,0.8)]"></span>
                        <span class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce delay-200 shadow-[0_0_5px_rgba(59,130,246,0.8)]"></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            lucide.createIcons();
            div.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
    </script>
