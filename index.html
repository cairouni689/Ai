        /* ==================== THINKING MODE STYLES ==================== */
.thinking-container {
    background: rgba(15, 15, 20, 0.95);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 12px;
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
}

.thinking-header {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    padding: 4px 0;
}

.thinking-sparkle {
    width: 18px;
    height: 18px;
    color: #f59e0b;
    animation: sparkleRotate 3s linear infinite;
}

@keyframes sparkleRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.thinking-label {
    font-size: 0.9rem;
    font-weight: 600;
    color: #f59e0b;
    letter-spacing: 0.02em;
}

.thinking-toggle {
    margin-right: auto;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6b7280;
    transition: transform 0.3s ease, color 0.2s;
    border-radius: 6px;
}

.thinking-toggle:hover {
    color: #fff;
    background: rgba(255,255,255,0.05);
}

.thinking-toggle.collapsed {
    transform: rotate(-90deg);
}

.thinking-content {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    color: #9ca3af;
    font-size: 0.88rem;
    line-height: 1.85;
    max-height: 400px;
    overflow-y: auto;
    transition: max-height 0.4s ease, opacity 0.3s ease, margin 0.3s ease;
}

.thinking-content.collapsed {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
    padding-top: 0;
    overflow: hidden;
    border-top-color: transparent;
}

/* Thinking content markdown styling */
.thinking-content p { margin-bottom: 0.6em; }
.thinking-content h1, .thinking-content h2, .thinking-content h3 {
    font-weight: 600;
    margin-top: 0.8em;
    margin-bottom: 0.3em;
    color: #d1d5db;
    font-size: 0.92em;
}
.thinking-content ul, .thinking-content ol {
    margin-right: 1.2em;
    margin-bottom: 0.5em;
}
.thinking-content li { margin-bottom: 0.15em; }
.thinking-content strong { color: #e5e7eb; }
.thinking-content code {
    background: rgba(255,255,255,0.06);
    padding: 0.1em 0.3em;
    border-radius: 4px;
    font-size: 0.85em;
}
.thinking-content blockquote {
    border-right: 3px solid #4b5563;
    padding-right: 0.8em;
    color: #6b7280;
    font-style: italic;
}

/* Thinking shimmer while loading */
.thinking-shimmer {
    background: linear-gradient(90deg, transparent 0%, rgba(245, 158, 11, 0.08) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
    border-radius: 8px;
    height: 16px;
    margin: 6px 0;
}

@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

/* Hide old typing indicator dots */
#typing-indicator { display: none !important; }

/* تنسيقات خطوات التفكير الصايعة */
.thinking-step {
    opacity: 0;
    transform: translateY(8px);
    animation: stepFadeIn 0.4s ease-out forwards;
    padding: 6px 0;
}
@keyframes stepFadeIn {
    to { opacity: 1; transform: translateY(0); }
}

    <script>
        lucide.createIcons();

        function escapeHtmlText(text) {
            if (!text) return '';
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
        // 🛠️ نظام الخزنة: دالة رندرة المعادلات الرياضية المعزولة لضمان عدم تعارضها مع الماركداون
// 🛠️ نظام الخزنة: دالة رندرة المعادلات الرياضية المعزولة (النسخة الخالية من الثغرات)
// ==========================================
// 🛠️ دالة رندرة المعادلات الرياضية - نسخة مؤمنة للـ TypeWriter
// ==========================================
function renderBulletproofMath(text) {
    if (!text) return '';

    // 1. تنظيف أخطاء Gemini الشائعة
    let processedText = text
        .replace(/\\\$/g, '$')
        .replace(/\\\[([\s\S]*?)\\\]/g, '\n$$\n$1\n$$\n')
        .replace(/\\\(([\s\S]*?)\\\)/g, '$$$1$$')
        .replace(/\\\\\[([\s\S]*?)\\\\\]/g, '\n$$\n$1\n$$\n')
        .replace(/\\\\\(([\s\S]*?)\\\\\)/g, '$$$1$$')
        .replace(/\^\s*\\wedge\s*/g, '^')
        .replace(/\\wedge\s*\^/g, '^');

    // 2. إنشاء الخزنة (Vault) لعزل المعادلات
    const mathVault = [];
    let vaultIndex = 0;

    // عزل المعادلات الكبيرة (Block Math) $$ ... $$
    processedText = processedText.replace(/\$\$([\s\S]*?)\$\$/g, (match, mathCode) => {
        const placeholder = `MATHVAULTBLOCK${vaultIndex}END`;
        mathVault.push({ type: 'block', code: mathCode, placeholder: placeholder });
        vaultIndex++;
        return placeholder;
    });

    // عزل المعادلات المدمجة (Inline Math) $ ... $
    // نستخدم regex بسيطة ومؤمنة (بدون lookbehind عشان Safari)
    processedText = processedText.replace(/\$((?:[^$\\]|\\.)+?)\$/g, (match, mathCode) => {
        const placeholder = `MATHVAULTINLINE${vaultIndex}END`;
        mathVault.push({ type: 'inline', code: mathCode, placeholder: placeholder });
        vaultIndex++;
        return placeholder;
    });

    // 3. تمرير النص النظيف إلى marked.js
    let htmlContent = '';
    try {
        htmlContent = marked.parse(processedText);
        // التعديل: إجبار اللينكات تفتح في تاب جديدة بأمان
        htmlContent = htmlContent.replace(/<a /g, '<a target="_blank" rel="noopener noreferrer" ');
    } catch (e) {
        console.error("Marked parse error:", e);
        htmlContent = escapeHtmlText(processedText).replace(/\n/g, '<br>');
    }

    // 4. استرجاع المعادلات من الخزنة ورندرتها بـ KaTeX
    mathVault.forEach((item) => {
        try {
            const renderedMath = katex.renderToString(item.code, {
                displayMode: item.type === 'block',
                throwOnError: false,
                output: 'html',
                errorColor: '#ef4444'
            });
            htmlContent = htmlContent.replace(item.placeholder, renderedMath);
        } catch (err) {
            console.error("KaTeX Render Error:", err);
            htmlContent = htmlContent.replace(item.placeholder, `<span class="text-red-400 font-mono">${escapeHtmlText(item.code)}</span>`);
        }
    });

    return htmlContent;
}

        async function migrateGuestSession() {
            const pendingSessionStr = localStorage.getItem('pendingGuestSession');
            if (pendingSessionStr) {
                // نحذفها من الذاكرة فوراً عشان متتكررش مرتين

                try {

                        const newSessionId = crypto.randomUUID();
                        const firstUserMsg = messages.find(m => m.role === 'user')?.content || 'محادثة جديدة';
                        const title = firstUserMsg.substring(0, 30) + (firstUserMsg.length > 30 ? '...' : '');

                        // حفظ الجلسة والرسايل للـ User الجديد في قاعدة البيانات
                        await supabaseClient.from('sessions').insert([
                            { id: newSessionId, user_id: currentUserId, title: title }
                        ]);

                        const messagesToInsert = messages.map(msg => ({
                            session_id: newSessionId,
                            role: msg.role,
                            content: msg.content
                        }));

                        await supabaseClient.from('messages').insert(messagesToInsert);

                        // تعيين الجلسة الحالية
                        currentState.sessionId = newSessionId;
                        currentState.messages = messages;

                }

        const canvas = document.getElementById('space-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let stars = [];

        function initStars() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            stars = [];
            const count = Math.floor((width * height) / 9000); 
            for (let i = 0; i < count; i++) {
                stars.push({ x: Math.random() * width, y: Math.random() * height, radius: Math.random() * 1.5 + 0.5, vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.15, alpha: Math.random() * 0.6 + 0.2, dAlpha: (Math.random() - 0.5) * 0.005 });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, width, height);
            stars.forEach(star => {
                star.x += star.vx; star.y += star.vy;
                if (star.x < 0) star.x = width; if (star.x > width) star.x = 0;
                if (star.y < 0) star.y = height; if (star.y > height) star.y = 0;
                star.alpha += star.dAlpha;
                if (star.alpha <= 0.1 || star.alpha >= 0.8) star.dAlpha *= -1;
                ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`; ctx.fill();
            });
            requestAnimationFrame(animateStars);
        }
        window.addEventListener('resize', initStars);

        async function callWorkerAPI(data, signal) {
            const WORKER_URL = "https://geminiapikey.yousefgamed22.workers.dev"; 
            try {
                const res = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                    signal: signal
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`Worker Error (${res.status}): ${errText}`);
                }
                
                const json = await res.json();
                return json; 
            } catch (e) {
                throw new Error(`فشل الاتصال: ${e.message}`);
            }
        }

async function generateAndSaveTitle(sessionId, content, fileObj) {
    try {
        const shortContent = content.substring(0, 1000);
        
        const prompt = `أنت مساعد ذكي وظيفتك فقط كتابة عناوين قصيرة جداً للمحادثات.
اكتب عنوان قصير جداً (من كلمتين إلى 4 كلمات كحد أقصى) يعبر عن محتوى هذه الرسالة أو الملف المرفق.

المحتوى: ${shortContent}`;

        // جلب التوكن الحالي
        let currentToken = null;
        if (currentUser) {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            currentToken = sessionData.session?.access_token;
        }

        // قراءة الموديل المختار حالياً
        const modelSelector = document.getElementById('model-selector');
        const selectedModel = modelSelector ? modelSelector.value : "gemini-2.5-flash";

        const payloadData = {
            message: prompt,
            systemInstruction: "أنت خبير عالمي في هندسة الأوامر (Prompt Engineering). وظيفتك الوحيدة هي صياغة وتحويل النصوص العادية إلى أوامر (Prompts) احترافية جداً وخالية من الثغرات لضمان أقوى وأدق إجابة من نماذج الذكاء الاصطناعي.",
            history: [],
            model: selectedModel,
            fileObj: null,
            userId: currentUserId,
            userToken: currentToken,
            sessionId: sessionId,
            tools: []
        };

        const responseData = await callWorkerAPI(payloadData, new AbortController().signal);
        
        let smartTitle = responseData.content.replace(/[\*\#\`\"]/g, '').trim();
        if (smartTitle.length > 40) smartTitle = smartTitle.substring(0, 40) + '...';
        if (!smartTitle) smartTitle = 'محادثة جديدة ✨';

        await supabaseClient
            .from('sessions')
            .update({ title: smartTitle })
            .eq('id', sessionId);

        loadSessionsList();
        
    } catch (error) {
        console.error("فشل توليد العنوان الذكي:", error);
        await supabaseClient
            .from('sessions')
            .update({ title: 'محادثة جديدة ✨' })
            .eq('id', sessionId);
        loadSessionsList();
    }
}

// ⚠️ typeWriterHTML - النسخة المؤمنة والمكتملة
// ==========================================
async function typeWriterHTML(element, html, scrollContainer, originalText) {
    isGenerating = true;
    stopTypingFlag = false;
    
    let currentText = "";
    const chunkSize = 30; // أصغر شوية عشان نتجنب أخطاء المعادلات النصية المكسورة

    try {
        // الأنيميشن بتاع الكتابة بالتدريج
        for (let i = 0; i < originalText.length; i += chunkSize) {
            if (stopTypingFlag) break;
            
            currentText += originalText.substring(i, i + chunkSize);
            
            // ✅ مؤمن: لو renderBulletproofMath فشل، نعرض النص العادي
            let renderedChunk = '';
            try {
                renderedChunk = renderBulletproofMath(currentText);
            } catch (renderErr) {
                console.warn("Render error during typing, using plain text:", renderErr);
                renderedChunk = escapeHtmlText(currentText).replace(/\n/g, '<br>');
            }
            
            element.innerHTML = renderedChunk + '<span class="typing-cursor"></span>';
            
            // Scroll تلقائي
            if (scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 200) {
                scrollContainer.scrollTop = scrollContainer.scrollHeight;
            }
            
            await new Promise(resolve => setTimeout(resolve, 15)); // أسرع شوية
        }
    } catch (loopError) {
        console.error("TypeWriter loop error:", loopError);
    }

    // ==========================================
    // ✅ الخطوات النهائية - لازم تتنفذ مهما حصل
    // ==========================================
    
    // 1. حط الرد النهائي بالكامل
    let finalHTML = '';
    try {
        finalHTML = stopTypingFlag 
            ? renderBulletproofMath(currentText) + '<br><span class="text-red-400 text-xs">[تم الإيقاف]</span>'
            : html; // html ده هو الـ parsedText الكامل اللي جه من addMessage
    } catch (e) {
        console.error("Final render error:", e);
        finalHTML = escapeHtmlText(originalText).replace(/\n/g, '<br>');
    }
    
    element.innerHTML = finalHTML;

    // 2. تفعيل تلوين الأكواد البرمجية
    try {
        element.querySelectorAll('pre code').forEach((block) => {
            try { hljs.highlightElement(block); } catch(e) {}
        });
    } catch(e) {}

    // 3. حقن زرار الكانفاس
    try {
        injectCanvasButtons(element);
    } catch(e) { console.error("Canvas injection error:", e); }

    // 4. Scroll للآخر
    try {
        if (scrollContainer.scrollHeight - scrollContainer.scrollTop <= scrollContainer.clientHeight + 200) {
            scrollContainer.scrollTop = scrollContainer.scrollHeight;
        }
    } catch(e) {}

    // 5. حفظ الرسالة في السيشن
    if (!stopTypingFlag) {
        try {
            await saveMessageToSession('ai', originalText);
        } catch(e) { console.error("Save message error:", e); }
    }

    // 6. إظهار زراير الـ Actions (السماع والنسخ)
    const actionsDiv = element.querySelector('.message-actions');
    if (actionsDiv) {
        setTimeout(() => {
            actionsDiv.classList.remove('opacity-0');
            actionsDiv.style.opacity = '1';
        }, 50);
    }

    // 7. إرجاع زرار الإرسال لوضعه الطبيعي
            isGenerating = false;
            toggleSendButtonState(false);
            
            // 8. تحديث الأيقونات
            try { lucide.createIcons(); } catch(e) {}
        }

function startFakeThinking(thinkingId) {
            const contentDiv = document.getElementById(`thinking-content-${thinkingId}`);
            if (!contentDiv) return;

            const phrases = thinkingPhrasesLists[Math.floor(Math.random() * thinkingPhrasesLists.length)];
            let stepIndex = 0;

            const addStep = () => {
                if (stepIndex >= phrases.length || currentThinkingId !== thinkingId) {
                    if (thinkingInterval) clearInterval(thinkingInterval);
                    return;
                }

                const stepDiv = document.createElement('div');
                stepDiv.className = 'thinking-step text-xs md:text-sm text-gray-300 flex items-center gap-3';
                
                stepDiv.innerHTML = `
                    <i data-lucide="loader-2" class="w-3 h-3 text-blue-400 animate-spin shrink-0"></i> 
                    <span class="font-mono tracking-wide">${phrases[stepIndex]}</span>
                `;

                if (stepIndex > 0) {
                    const prevStep = contentDiv.children[stepIndex - 1];
                    if (prevStep) {
                        prevStep.classList.replace('text-gray-300', 'text-gray-500');
                        prevStep.innerHTML = `
                            <i data-lucide="check" class="w-3 h-3 text-green-500 shrink-0"></i> 
                            <span class="font-mono tracking-wide">${phrases[stepIndex - 1]}</span>
                        `;
                        lucide.createIcons({root: prevStep});
                    }
                }

                contentDiv.appendChild(stepDiv);
                lucide.createIcons({root: stepDiv});
                
                if (!contentDiv.classList.contains('collapsed')) {
                    contentDiv.scrollTop = contentDiv.scrollHeight;
                }

                stepIndex++;
            };

            addStep();

            thinkingInterval = setInterval(() => {
                addStep();
            }, Math.floor(Math.random() * 1000) + 1200); 
        }

        function toggleThinkingCollapse(thinkingId) {
            const content = document.getElementById('thinking-content-' + thinkingId);
            const toggle = document.getElementById('thinking-toggle-' + thinkingId);
            if (!content || !toggle) return;
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                toggle.classList.remove('collapsed');
                isThinkingCollapsed = false;
            } else {
                content.classList.add('collapsed');
                toggle.classList.add('collapsed');
                isThinkingCollapsed = true;
            }
        }

        function removeThinkingIndicator() {
            // 1. نوقف التايمر عشان ميرميش جمل تانية
            if (thinkingInterval) {
                clearInterval(thinkingInterval);
                thinkingInterval = null;
            }
            
            const indicator = document.getElementById(currentThinkingId);
            if (indicator) {
                // 2. نغير شكل الهيدر عشان يبان إنه خلص تفكير
                const sparkle = indicator.querySelector('.thinking-sparkle');
                if (sparkle) {

                if (contentDiv) {
                    const lastStep = contentDiv.lastElementChild;
                    // شيكنا على animate-spin لأن loader-2 بتكون اتشالت جوه الـ SVG
                    if (lastStep && lastStep.innerHTML.includes('animate-spin')) {

                        // بنعيد بناء السطر بالكامل بأيقونة الصح الخضراء

        function arrayBufferToBase64(buffer) {
            let binary = ''; const bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return window.btoa(binary);
        }

        function playQuarkAudio(base64Data) {
            if (!liveAudioContext) return;
            
            // السطرين دول بيعملوا إيقاظ إجباري لكارت الصوت لو المتصفح عمله سليب
            if (liveAudioContext.state === 'suspended') {
                liveAudioContext.resume();
            }
            
            const binaryString = window.atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for(let i=0; i<int16Array.length; i++) float32Array[i] = int16Array[i] / 0x7FFF;
            
            const audioBuffer = liveAudioContext.createBuffer(1, float32Array.length, 24000);
            audioBuffer.getChannelData(0).set(float32Array);
            
            const source = liveAudioContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(liveAudioContext.destination);
            
            if (nextAudioTime < liveAudioContext.currentTime) {
                nextAudioTime = liveAudioContext.currentTime;
            }
            
            source.start(nextAudioTime);
            nextAudioTime += audioBuffer.duration;
            
            activeAudioSources.push(source);

            source.onended = () => {
                activeAudioSources = activeAudioSources.filter(s => s !== source);
            };
        }

        // 2. دالة التصدير كـ Markdown
        function exportChat() {
            if (currentState.messages.length === 0) {
                showQuarkAlert('مفيش محادثة عشان نحملها يا دكتور! 📝', 'warning');
                return;
            }

            let mdContent = `# 🚀 محادثة كوارك - Cairo SciVerse\n`;
            mdContent += `*التاريخ: ${new Date().toLocaleDateString('ar-EG')}*\n\n---\n\n`;

            currentState.messages.forEach(msg => {
                let roleName = msg.role === 'user' ? '🧑‍🎓 الطالب' : '🤖 كوارك';
                mdContent += `### ${roleName}:\n${msg.content}\n\n---\n\n`;
            });

            const blob = new Blob([mdContent], { type: 'text/markdown;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Quark_SciVerse_${new Date().toISOString().slice(0,10)}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

            });
        }
       // تسجيل الـ Service Worker بدون لوب الريفريش الغبي
        if ('serviceWorker' in navigator) {
            window.addEventListener('pageshow', function (event) {
                if (event.persisted) {
                    window.location.reload(true);
                }
            });

            window.addEventListener('load', () => {
                // شيلنا متغير الوقت ومسح الكاش الإجباري عشان نوقف لوب الريفريش اللانهائي
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ تم تسجيل Service Worker بنجاح!', registration.scope);
                        
                        // بيشيك على التحديث في الباك جراوند بهدوء بدون ما يعمل ريفريش يجلطنا
                        registration.update();
                    })
                    .catch(err => {
                        console.log('❌ فشل تسجيل الـ Service Worker:', err);
                    });
            });
        }

        // ==========================================
// ⚠️ الدالة دي اتصلحت بالكامل
// ==========================================
async function generateAndSaveTitle(sessionId, content, fileObj) {
    try {
        const shortContent = content.substring(0, 1000);
        
        const prompt = `أنت مساعد ذكي وظيفتك فقط كتابة عناوين قصيرة جداً للمحادثات.
اكتب عنوان قصير جداً (من كلمتين إلى 4 كلمات كحد أقصى) يعبر عن محتوى هذه الرسالة أو الملف المرفق.
إياك كتابة أي مقدمات أو علامات تنصيص، اكتب العنوان فقط مباشرة.
المحتوى: ${shortContent}`;

        // جلب التوكن الحالي
        let currentToken = null;
        if (currentUser) {
            const { data: sessionData } = await supabaseClient.auth.getSession();
            currentToken = sessionData.session?.access_token;
        }

        // قراءة الموديل المختار حالياً
        const modelSelector = document.getElementById('model-selector');
        const selectedModel = modelSelector ? modelSelector.value : "gemini-2.5-flash";

        const payloadData = {
            message: prompt,
            systemInstruction: "أنت خبير عالمي في هندسة الأوامر (Prompt Engineering). وظيفتك الوحيدة هي صياغة وتحويل النصوص العادية إلى أوامر (Prompts) احترافية جداً وخالية من الثغرات لضمان أقوى وأدق إجابة من نماذج الذكاء الاصطناعي.",
            history: [],
            model: selectedModel,
            fileObj: null,
            userId: currentUserId,
            userToken: currentToken,
            sessionId: sessionId,
            thinking: false,
            tools: ["google_search"]
        };

        const responseData = await callWorkerAPI(payloadData, new AbortController().signal);
        
        let smartTitle = responseData.content.replace(/[\*\#\`\"]/g, '').trim();
        if (smartTitle.length > 40) smartTitle = smartTitle.substring(0, 40) + '...';
        if (!smartTitle) smartTitle = 'محادثة جديدة ✨';

        await supabaseClient
            .from('sessions')
            .update({ title: smartTitle })
            .eq('id', sessionId);

        loadSessionsList();
        
    } catch (error) {
        console.error("فشل توليد العنوان الذكي:", error);
        await supabaseClient
            .from('sessions')
            .update({ title: 'محادثة جديدة ✨' })
            .eq('id', sessionId);
        loadSessionsList();
    }
}

        // ==========================================
        // 🎨 Quark Canvas & Artifacts
        // ==========================================
        let currentCanvasCode = "";

        function openQuarkCanvas(btn) {
            // تعديل مسار البحث: الزرار مبقاش جوه pre، بقى جوه الغلاف الخارجي
            const wrapper = btn.closest('.code-wrapper-container');
            const codeBlock = wrapper.querySelector('code');
            if (!codeBlock) return;

            currentCanvasCode = codeBlock.innerText;
            
            const modal = document.getElementById('quark-canvas-modal');
            const iframe = document.getElementById('canvas-iframe');

            iframe.srcdoc = currentCanvasCode;

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('translate-y-full');
            }, 10);
        }

        function closeQuarkCanvas() {
            const modal = document.getElementById('quark-canvas-modal');
            modal.classList.add('translate-y-full');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                document.getElementById('canvas-iframe').srcdoc = ''; 
            }, 500);
        }

        function copyCanvasCode() {
            navigator.clipboard.writeText(currentCanvasCode);
            showQuarkAlert('تم نسخ الكود بنجاح يا بطل! 📋', 'success');
        }

        function copyExtractedCode(btn) {
            const wrapper = btn.closest('.code-wrapper-container');
            const codeBlock = wrapper.querySelector('code');
            if (codeBlock) {
                navigator.clipboard.writeText(codeBlock.innerText);
                showToast('عاش! تم نسخ الكود بنجاح 💻');
            }
        }

        function injectCanvasButtons(element) {
            element.querySelectorAll('pre').forEach(pre => {
                // لو عملناله غلاف قبل كده، نتخطاه
                if (pre.parentElement.classList.contains('code-wrapper-container')) return;

                // 1. هنعمل غلاف (Wrapper) بره الـ pre عشان الزراير متتقصش
                const wrapper = document.createElement('div');
                wrapper.className = 'code-wrapper-container relative mt-8 mb-4'; // مسافة من فوق عشان الزراير
                
                // تغليف الـ pre جوه الـ wrapper
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(pre);

                // 2. تظبيط شكل الـ pre نفسه
                pre.classList.add('border', 'border-white/20', 'bg-[#131314]', 'rounded-xl', 'p-4', 'overflow-x-auto');

                const codeBlock = pre.querySelector('code');
                if (!codeBlock) return;
                
                const codeText = codeBlock.innerText;
                
                // 3. حاوية الزراير (هتقعد على البوردر بتاع الغلاف الخارجي مش الـ pre)
                const btnWrapper = document.createElement('div');
                btnWrapper.className = 'absolute -top-4 left-4 flex gap-2 z-10'; 
                
                let canvasBtnHTML = '';
                // لو الكود HTML نظهر زرار الكانفاس
                if (codeBlock.classList.contains('language-html') || codeText.includes('<html') || codeText.includes('<!DOCTYPE') || (codeText.includes('<div') && codeText.includes('class='))) {
                    canvasBtnHTML = `
                        <button onclick='openQuarkCanvas(this)' class="w-8 h-8 bg-[#1e1e1e] hover:bg-blue-600 text-gray-300 hover:text-white rounded-md flex items-center justify-center shadow-[0_4px_10px_rgba(0,0,0,0.8)] transition-all duration-300 border border-white/20 hover:border-blue-500 hover:shadow-[0_0_15px_rgba(59,130,246,0.6)] group" title="تشغيل في Canvas">
                            <i data-lucide="play" class="w-4 h-4 ml-0.5 group-hover:scale-110 transition-transform"></i>
                        </button>
                    `;
                }

                // زرار النسخ ثابت لكل الأكواد
                const copyBtnHTML = `
                    <button onclick='copyExtractedCode(this)' class="w-8 h-8 bg-[#1e1e1e] hover:bg-green-600 text-gray-300 hover:text-white rounded-md flex items-center justify-center shadow-[0_4px_10px_rgba(0,0,0,0.8)] transition-all duration-300 border border-white/20 hover:border-green-500 hover:shadow-[0_0_15px_rgba(34,197,94,0.6)] group" title="نسخ الكود">
                        <i data-lucide="copy" class="w-4 h-4 group-hover:scale-110 transition-transform"></i>
                    </button>
                `;

                btnWrapper.innerHTML = canvasBtnHTML + copyBtnHTML;
                wrapper.appendChild(btnWrapper);
                lucide.createIcons({root: wrapper});
            });
        }

// ==========================================
        // 🔔 نظام الإشعارات المنبثقة (Toast Notification)
        // ==========================================
        function showToast(message) {
            let toastContainer = document.getElementById('toast-container');
            if (!toastContainer) {
                toastContainer = document.createElement('div');
                toastContainer.id = 'toast-container';
                toastContainer.className = 'fixed bottom-5 right-5 flex flex-col gap-2 z-[250] pointer-events-none';
                document.body.appendChild(toastContainer);
            }

            const toast = document.createElement('div');
            toast.className = 'bg-[#1e1e1e] border border-white/10 text-white px-4 py-3 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.8)] flex items-center gap-3 transform translate-y-10 opacity-0 transition-all duration-300 pointer-events-auto';
            toast.innerHTML = `
                <div class="bg-green-500/20 text-green-400 p-1.5 rounded-lg border border-green-500/30">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i>
                </div>
                <span class="text-sm font-sans font-medium">${message}</span>
            `;

            toastContainer.appendChild(toast);
            lucide.createIcons({root: toast});

            // إظهار بنعومة
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            // إخفاء بعد 3 ثواني
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

function toggleModelMenu() {
            const menu = document.getElementById('custom-model-menu');
            const chevron = document.getElementById('model-chevron');
            if (menu.classList.contains('opacity-0')) {
                menu.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-2');
                menu.classList.add('opacity-100', 'translate-y-0');
                chevron.style.transform = 'rotate(180deg)';
            } else {
                closeModelMenu();
            }
        }

        function closeModelMenu() {
            const menu = document.getElementById('custom-model-menu');
            const chevron = document.getElementById('model-chevron');
            if (menu && !menu.classList.contains('opacity-0')) {
                menu.classList.add('opacity-0', 'pointer-events-none', '-translate-y-2');
                menu.classList.remove('opacity-100', 'translate-y-0');
                chevron.style.transform = 'rotate(0deg)';
            }
        }

        function selectModel(val, name, iconName) {
            document.getElementById('model-selector').value = val;
            document.getElementById('current-model-name').innerText = name;
            
            const iconEl = document.getElementById('current-model-icon');
            iconEl.setAttribute('data-lucide', iconName);
            lucide.createIcons();
            
            closeModelMenu();
            showToast(`تم التبديل لمحرك ${name} 🚀`);
        }

        document.addEventListener('click', function(e) {
            const container = document.getElementById('model-dropdown-container');
            if (container && !container.contains(e.target)) {
                closeModelMenu();
            }
        });

    </script>
